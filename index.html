<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoMail</title>
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.460.0/font/lucide.min.css">
    <style>
        /* ─── Obsidian / VSCode Dark Theme ────────────── */
        :root {
            --bg: #1e1e2e;
            --bg-surface: #181825;
            --card: #1e1e2e;
            --card-border: #313244;
            --card-hover: #262637;
            --text: #cdd6f4;
            --text-muted: #6c7086;
            --accent-blue: #89b4fa;
            --accent-blue-glow: rgba(137, 180, 250, 0.08);
            --accent-green: #a6e3a1;
            --accent-orange: #fab387;
            --accent-purple: #cba6f7;
            --accent-pink: #f38ba8;
            --accent-slate: #9399b2;
            --progress-bg: #11111b;
            --checked: #a6e3a1;
            --titlebar-bg: #11111b;
            --titlebar-border: #313244;
            --titlebar-btn-hover: rgba(255,255,255,0.06);
            --titlebar-close-hover: #e04040;
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.3);
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── Scrollbar Hiding & Custom ────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Re-enable selection on editable content */
        input, textarea, [contenteditable], .task-label, .terminal-output, .mail-field textarea, .mail-field input {
            user-select: text;
            -webkit-user-select: text;
        }

        /* ─── Custom Titlebar ─────────────────────────── */
        .titlebar {
            display: flex;
            align-items: center;
            height: 38px;
            background: var(--titlebar-bg);
            border-bottom: 1px solid var(--titlebar-border);
            -webkit-app-region: drag;
            app-region: drag;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50000;
            padding: 0 8px;
            gap: 10px;
        }
        .titlebar-icon {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            -webkit-app-region: no-drag;
        }
        .titlebar-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex: 1;
        }
        .titlebar-controls {
            display: flex;
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }
        .titlebar-btn {
            width: 46px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .titlebar-btn:hover {
            background: var(--titlebar-btn-hover);
            color: var(--text);
        }
        .titlebar-btn.close:hover {
            background: var(--titlebar-close-hover);
            color: #fff;
        }
        .titlebar-btn svg {
            width: 16px; height: 16px;
            stroke: currentColor; stroke-width: 1.5;
            fill: none;
        }

        /* ─── App Content Area (below titlebar) ────────── */
        .app-content {
            margin-top: 38px;
            height: calc(100vh - 38px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem 0.75rem;
        }

        /* ─── Layout ─────────────────────────────────── */
        .container { max-width: 900px; margin: 0 auto; }

        /* ─── Tabs ───────────────────────────────────── */
        .tab-bar {
            display: flex; gap: 0; margin-bottom: 1.5rem;
            background: var(--bg-surface); border-bottom: 1px solid var(--card-border);
        }
        .tab-btn {
            padding: 0.6rem 1.2rem; border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; font-size: 0.82rem; font-weight: 500;
            transition: all 0.15s; text-align: center; position: relative;
            display: flex; align-items: center; gap: 0.45rem; letter-spacing: 0.01em;
        }
        .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
        .tab-btn.active {
            color: var(--text);
            box-shadow: inset 0 -2px 0 var(--accent-blue);
        }
        .tab-btn .lucide, .tab-btn i { font-size: 14px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ─── Header ─────────────────────────────────── */
        header { text-align: center; margin-bottom: 1.5rem; }
        header h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
        .header-actions {
            display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.75rem; flex-wrap: wrap;
        }
        .header-actions button, .mail-actions button {
            padding: 0.4rem 0.8rem; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
            background: transparent; color: var(--text-muted); cursor: pointer;
            font-size: 0.8rem; font-weight: 500; transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 0.35rem;
        }
        .header-actions button:hover, .mail-actions button:hover {
            background: rgba(137,180,250,0.08); color: var(--text);
        }
        .header-actions button.active {
            background: rgba(137,180,250,0.1); color: var(--accent-blue);
        }

        /* ─── Global Progress ────────────────────────── */
        .global-progress {
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md);
            padding: 1rem 1.25rem; margin-bottom: 1.5rem; position: sticky; top: 0; z-index: 100;
        }
        .global-progress-header {
            display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem;
        }
        .global-progress-header span:first-child { font-weight: 600; font-size: 1rem; }
        .global-progress-header .counter { font-size: 0.9rem; color: var(--text-muted); }
        .global-progress-header .counter strong { color: var(--accent-green); }
        .progress-bar-track {
            width: 100%; height: 3px; background: var(--progress-bg);
            border-radius: 2px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transition: width 0.4s ease; width: 0%;
        }
        .progress-percent { text-align: right; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.35rem; }

        /* ─── Section ────────────────────────────────── */
        .section {
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md);
            margin-bottom: 1rem; overflow: hidden; transition: background 0.15s;
        }
        .section:hover { background: var(--card-hover); }
        .section-header {
            padding: 1.25rem 1.5rem; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; user-select: none;
        }
        .section-header:hover { background: rgba(255,255,255,0.02); }
        body.edit-mode .section-header { cursor: default; }
        body.edit-mode .section-header:hover { background: transparent; }
        .section-title { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .section-badge {
            font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 3px; font-weight: 500;
        }
        .section-desc {
            padding: 0 1.5rem; font-size: 0.85rem; color: var(--text-muted);
            font-style: italic; margin-bottom: 0.5rem;
        }
        .section-header-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
        .section-progress-mini { width: 120px; display: flex; align-items: center; gap: 0.6rem; }
        .mini-bar {
            flex: 1; height: 3px; background: var(--progress-bg); border-radius: 2px; overflow: hidden;
        }
        .section-progress-mini .mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; width: 0%; }
        .section-progress-mini .mini-text { font-size: 0.75rem; color: var(--text-muted); min-width: 32px; text-align: right; }

        /* ─── Colors Per Section ─────────────────────── */
        .section[data-color="blue"] .section-title { color: var(--accent-blue); }
        .section[data-color="blue"] .section-badge { background: rgba(108,138,255,0.15); color: var(--accent-blue); }
        .section[data-color="blue"] .mini-fill { background: var(--accent-blue); }
        .section[data-color="orange"] .section-title { color: var(--accent-orange); }
        .section[data-color="orange"] .section-badge { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
        .section[data-color="orange"] .mini-fill { background: var(--accent-orange); }
        .section[data-color="green"] .section-title { color: var(--accent-green); }
        .section[data-color="green"] .section-badge { background: rgba(52,211,153,0.15); color: var(--accent-green); }
        .section[data-color="green"] .mini-fill { background: var(--accent-green); }
        .section[data-color="purple"] .section-title { color: var(--accent-purple); }
        .section[data-color="purple"] .section-badge { background: rgba(167,139,250,0.15); color: var(--accent-purple); }
        .section[data-color="purple"] .mini-fill { background: var(--accent-purple); }
        .section[data-color="pink"] .section-title { color: var(--accent-pink); }
        .section[data-color="pink"] .section-badge { background: rgba(244,114,182,0.15); color: var(--accent-pink); }
        .section[data-color="pink"] .mini-fill { background: var(--accent-pink); }
        .section[data-color="slate"] .section-title { color: var(--accent-slate); }
        .section[data-color="slate"] .section-badge { background: rgba(148,163,184,0.15); color: var(--accent-slate); }
        .section[data-color="slate"] .mini-fill { background: var(--accent-slate); }

        /* ─── Tasks ──────────────────────────────────── */
        .task-list { padding: 0 1rem 1rem; }
        .task-item {
            display: flex; align-items: flex-start; gap: 0.6rem;
            padding: 0.5rem 0.6rem; border-radius: var(--radius-sm); transition: background 0.1s;
        }
        .task-item:hover { background: rgba(255,255,255,0.02); }
        .task-item.checked .task-label { text-decoration: line-through; color: var(--text-muted); }
        .task-item.checked .custom-check { background: var(--checked); border-color: var(--checked); }
        .task-item.checked .custom-check svg { opacity: 1; }
        .task-item.sub-task { margin-left: 2rem; }
        .task-item.is-mail .task-label::before { content: ''; }
        .custom-check {
            width: 18px; height: 18px; min-width: 18px; border: 1.5px solid var(--card-border);
            border-radius: 3px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.15s; margin-top: 2px;
        }
        .custom-check:hover { border-color: var(--accent-blue); }
        .custom-check svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.2s; stroke: white; stroke-width: 3; fill: none; }
        .task-label { font-size: 0.88rem; cursor: pointer; flex: 1; transition: color 0.2s; }
        .task-note { display: block; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.15rem; font-style: italic; }

        /* ─── Edit Mode ──────────────────────────────── */
        .task-edit-fields { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
        .task-input, .task-note-input {
            width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); background: var(--progress-bg); color: var(--text);
            font-size: 0.85rem; font-family: inherit;
        }
        .task-note-input { font-size: 0.8rem; color: var(--text-muted); }
        .task-input:focus, .task-note-input:focus { outline: none; border-color: var(--accent-blue); }
        .btn-icon {
            background: none; border: none; cursor: pointer; font-size: 0.85rem;
            padding: 0.3rem; opacity: 0.5; transition: opacity 0.2s;
        }
        .btn-icon:hover { opacity: 1; }
        .edit-actions { display: flex; gap: 0.2rem; align-items: flex-start; margin-top: 2px; }
        .add-task-btn {
            width: 100%; padding: 0.5rem; border: 1px dashed var(--card-border);
            border-radius: var(--radius-sm); background: transparent; color: var(--text-muted);
            cursor: pointer; font-size: 0.8rem; transition: all 0.15s; margin-top: 0.5rem;
        }
        .add-task-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .add-section-btn {
            width: 100%; padding: 0.8rem; border: 1px dashed var(--card-border);
            border-radius: var(--radius-md); background: transparent; color: var(--text-muted);
            cursor: pointer; font-size: 0.85rem; transition: all 0.15s; margin-top: 0.75rem;
        }
        .add-section-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ─── Drag & Drop ────────────────────────────── */
        .task-item[draggable="true"] { cursor: grab; }
        .task-item.dragging { opacity: 0.3; }
        .section.drag-over { outline: 2px dashed var(--accent-blue); outline-offset: -2px; }

        /* ─── Modal ──────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-lg);
            padding: 1.5rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { margin-bottom: 1.5rem; font-size: 1.2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; font-weight: 600; }
        .form-group input[type="text"], .form-group input[type="password"] {
            width: 100%; padding: 0.5rem 0.7rem; border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); background: var(--progress-bg); color: var(--text);
            font-size: 0.85rem; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: var(--accent-blue); }
        .form-group small { display: block; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
        .modal-actions button {
            padding: 0.45rem 1rem; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
            background: var(--progress-bg); color: var(--text-muted); cursor: pointer;
            font-size: 0.8rem; font-weight: 500; transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 0.3rem;
        }
        .modal-actions button:hover { border-color: var(--accent-blue); color: var(--text); }
        .btn-primary { background: var(--accent-blue) !important; border-color: var(--accent-blue) !important; color: white !important; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-danger { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; }

        /* ─── Emoji Picker ───────────────────────────── */
        .emoji-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0.3rem; max-height: 200px; overflow-y: auto; }
        .emoji-btn {
            width: 36px; height: 36px; border: 1px solid transparent; border-radius: 8px;
            background: none; cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; transition: all 0.15s;
        }
        .emoji-btn:hover { background: rgba(108,138,255,0.15); }
        .emoji-btn.selected { background: rgba(108,138,255,0.25); border-color: var(--accent-blue); }

        /* ─── Color Picker ───────────────────────────── */
        .color-picker { display: flex; gap: 0.75rem; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.selected { border-color: white; transform: scale(1.15); }

        /* ─── Loading ────────────────────────────────── */
        .loading-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15,17,23,0.85);
            z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column; gap: 1rem; backdrop-filter: blur(8px);
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner {
            width: 48px; height: 48px; border: 4px solid var(--card-border);
            border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { color: var(--text-muted); font-size: 0.95rem; }

        /* ─── Toast ──────────────────────────────────── */
        .toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 0.5rem 1.2rem; border-radius: var(--radius-sm);
            font-weight: 500; font-size: 0.8rem; opacity: 0;
            transition: all 0.3s ease; z-index: 10000; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--accent-green); color: #0f1117; }
        .toast.error { background: #ef4444; color: white; }

        /* ─── Confetti ───────────────────────────────── */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        /* ─── Mail Tab ───────────────────────────────── */
        .mail-composer {
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md);
            padding: 1.25rem; margin-bottom: 1rem;
        }
        .mail-composer h2 { font-size: 1.05rem; margin-bottom: 1rem; color: var(--accent-blue); font-weight: 600; display: flex; align-items: center; gap: 0.4rem; }
        .mail-field { margin-bottom: 1rem; }
        .mail-field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; font-weight: 600; }
        .mail-field select {
            width: 100%; background: var(--bg-surface); border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); padding: 0.5rem 0.7rem; color: var(--text);
            font-size: 0.85rem; cursor: pointer;
        }
        .mail-field select:focus { outline: none; border-color: var(--accent-blue); }
        .mail-field input, .mail-field textarea {
            width: 100%; padding: 0.5rem 0.7rem; border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); background: var(--progress-bg); color: var(--text);
            font-size: 0.85rem; font-family: inherit; resize: vertical;
        }
        .mail-field textarea { min-height: 180px; line-height: 1.6; }
        .mail-field input:focus, .mail-field textarea:focus { outline: none; border-color: var(--accent-blue); }
        .mail-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .mail-actions button.accent-green { background: var(--accent-green) !important; border-color: var(--accent-green) !important; color: #0f1117 !important; }
        .mail-actions button.accent-purple { background: var(--accent-purple) !important; border-color: var(--accent-purple) !important; color: white !important; }
        .mail-actions button.accent-orange { background: var(--accent-orange) !important; border-color: var(--accent-orange) !important; color: #0f1117 !important; }

        /* ─── Autocomplete ───────────────────────────── */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-surface); border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); max-height: 180px; overflow-y: auto;
            z-index: 500; display: none;
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item {
            padding: 0.4rem 0.7rem; cursor: pointer; font-size: 0.8rem;
            transition: background 0.1s; display: flex; justify-content: space-between;
        }
        .autocomplete-item:hover { background: rgba(137,180,250,0.08); }
        .autocomplete-item .ac-name { color: var(--text); }
        .autocomplete-item .ac-email { color: var(--text-muted); font-size: 0.8rem; }

        /* ─── Email Tags (multi-recipient) ────────────── */
        .email-tags-container {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem;
            width: 100%; background: var(--bg-surface); border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); padding: 0.4rem 0.5rem; min-height: 36px;
            cursor: text; transition: border-color 0.15s;
        }
        .email-tags-container:focus-within { border-color: var(--accent-blue); }
        .email-tag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: rgba(137,180,250,0.12); color: var(--accent-blue);
            border-radius: 3px; padding: 0.15rem 0.4rem; font-size: 0.75rem;
            max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .email-tag .tag-remove {
            cursor: pointer; font-size: 1rem; line-height: 1;
            opacity: 0.6; transition: opacity 0.15s; margin-left: 0.15rem;
        }
        .email-tag .tag-remove:hover { opacity: 1; }
        .email-tags-input {
            flex: 1; min-width: 120px; border: none; outline: none;
            background: transparent; color: var(--text); font-size: 0.9rem;
            padding: 0.15rem 0;
        }
        .email-tags-input::placeholder { color: var(--text-muted); }

        /* ─── Terminal Output ────────────────────────── */
        .terminal-output {
            background: #11111b; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
            padding: 0.75rem; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.78rem; color: #a6e3a1; max-height: 400px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all; margin-top: 0.75rem;
        }

        /* ─── Reminder Banner ────────────────────────── */
        .reminder-banner {
            background: rgba(250,179,135,0.08); border: 1px solid rgba(250,179,135,0.3);
            border-radius: var(--radius-sm); padding: 0.75rem 1rem; margin-bottom: 0.75rem;
            display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
        }
        .reminder-banner .reminder-text { flex: 1; font-size: 0.9rem; color: var(--accent-orange); }
        .reminder-banner button {
            padding: 0.4rem 0.8rem; border: 1px solid var(--accent-orange); border-radius: 8px;
            background: var(--accent-orange); color: #0f1117; cursor: pointer;
            font-size: 0.8rem; font-weight: 600;
        }
        .reminder-banner .btn-dismiss {
            background: transparent; color: var(--text-muted); border-color: var(--card-border);
        }

        /* ─── Mail Pending List ──────────────────────── */
        .mail-pending-list {
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md);
            margin-bottom: 1rem; overflow: hidden;
        }
        .mail-pending-list h2 {
            padding: 1.25rem 1.5rem; font-size: 1.1rem; font-weight: 700;
            color: var(--accent-blue); border-bottom: 1px solid var(--card-border); margin: 0;
        }
        .mail-pending-empty {
            padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;
        }
        .mail-group-label {
            padding: 0.5rem 1.5rem 0; font-size: 0.7rem; color: var(--text-muted);
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .mail-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--card-border);
            cursor: pointer; transition: background 0.15s;
        }
        .mail-item:last-child { border-bottom: none; }
        .mail-item:hover { background: rgba(137,180,250,0.04); }
        .mail-item.selected { background: rgba(137,180,250,0.08); border-left: 2px solid var(--accent-blue); }
        .mail-item.is-sent { opacity: 0.7; }
        .mail-item-check {
            width: 20px; height: 20px; min-width: 20px;
            border: 2px solid var(--card-border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .mail-item-check:hover { border-color: var(--accent-green); }
        .mail-item-check.done { background: var(--accent-green); border-color: var(--accent-green); }
        .mail-item-check.done svg { opacity: 1; }
        .mail-item-check svg { width: 12px; height: 12px; opacity: 0; stroke: white; stroke-width: 3; fill: none; }
        .mail-item-info { flex: 1; min-width: 0; }
        .mail-item-label { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mail-item-section { font-size: 0.75rem; color: var(--text-muted); }
        .mail-item-status {
            font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 99px; font-weight: 600; white-space: nowrap;
        }
        .mail-item-status.pending { background: rgba(74,144,244,0.15); color: var(--accent-blue); }
        .mail-item-status.sent { background: rgba(45,212,168,0.15); color: var(--accent-green); }
        .mail-item-status.waiting { background: rgba(240,160,48,0.15); color: var(--accent-orange); }
        .mail-item-status.responded { background: rgba(155,125,240,0.15); color: var(--accent-purple); }
        .mail-item-actions { display: flex; gap: 0.3rem; }
        .mail-item-actions button {
            background: none; border: none; cursor: pointer; font-size: 0.8rem;
            padding: 0.2rem 0.4rem; border-radius: 4px; transition: background 0.15s; opacity: 0.5;
        }
        .mail-item-actions button:hover { opacity: 1; background: rgba(255,255,255,0.05); }

        /* ─── Timeline ──────────────────────────────── */
        .timeline-container {
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md);
            margin-bottom: 1rem; overflow: hidden;
        }
        .timeline-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--card-border);
        }
        .timeline-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--accent-purple); margin: 0; }
        .timeline-nav { display: flex; gap: 0.5rem; }
        .timeline-nav button {
            background: var(--progress-bg); border: 1px solid var(--card-border); border-radius: 6px;
            color: var(--text-muted); cursor: pointer; padding: 0.25rem 0.6rem; font-size: 0.8rem;
            transition: all 0.15s;
        }
        .timeline-nav button:hover { border-color: var(--accent-blue); color: var(--text); }
        .timeline-scroll { overflow-x: auto; padding: 1.5rem 1rem 1rem; }
        .timeline-track {
            display: flex; position: relative; min-width: max-content; padding-bottom: 0.5rem;
        }
        .timeline-day {
            display: flex; flex-direction: column; align-items: center; min-width: 44px; position: relative;
        }
        .timeline-day-label {
            font-size: 0.6rem; color: var(--text-muted); margin-bottom: 0.5rem;
            font-weight: 600; text-align: center; line-height: 1.3;
        }
        .timeline-line {
            position: absolute; top: 34px; left: 0; right: 0; height: 2px;
            background: var(--card-border); z-index: 0;
        }
        .timeline-dot {
            width: 14px; height: 14px; border-radius: 50%; position: relative; z-index: 1;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent;
        }
        .timeline-dot:hover { transform: scale(1.4); }
        .timeline-dot.empty { width: 6px; height: 6px; background: var(--card-border); cursor: default; border: none; }
        .timeline-dot.empty:hover { transform: none; }
        .timeline-dot.sent { background: var(--accent-blue); border-color: var(--accent-blue); }
        .timeline-dot.reminder-pending { background: var(--accent-slate); border-color: var(--accent-slate); }
        .timeline-dot.reminder-due {
            background: #ef4444; border-color: #ef4444;
            box-shadow: 0 0 8px rgba(239,68,68,0.5);
            animation: pulse-red 1.5s ease-in-out infinite;
        }
        .timeline-dot.reminder-sent { background: var(--accent-orange); border-color: var(--accent-orange); }
        .timeline-dot.response { background: var(--accent-green); border-color: var(--accent-green); }
        .timeline-dot.today-marker {
            width: 10px; height: 10px; background: var(--accent-blue);
            border: 2px solid white; box-shadow: 0 0 6px var(--accent-blue);
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 4px rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 14px rgba(239,68,68,0.8); }
        }
        .timeline-event-label {
            font-size: 0.55rem; color: var(--text-muted); max-width: 80px;
            text-align: center; margin-top: 0.4rem; line-height: 1.2;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .timeline-today-col .timeline-day-label { color: var(--accent-blue); font-weight: 700; }
        .timeline-popover {
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: var(--bg-surface); border: 1px solid var(--card-border); border-radius: var(--radius-md);
            padding: 0.6rem; min-width: 200px; z-index: 200;
            box-shadow: var(--shadow-lg); display: none;
        }
        .timeline-popover.show { display: block; }
        .timeline-popover-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; }
        .timeline-popover-actions { display: flex; flex-direction: column; gap: 0.3rem; }
        .timeline-popover-actions button {
            padding: 0.35rem 0.6rem; border: 1px solid var(--card-border); border-radius: 6px;
            background: var(--progress-bg); color: var(--text); cursor: pointer;
            font-size: 0.75rem; text-align: left; transition: all 0.15s;
        }
        .timeline-popover-actions button:hover { border-color: var(--accent-blue); background: rgba(74,144,244,0.1); }
        .timeline-popover-actions button.danger:hover { border-color: #ef4444; background: rgba(239,68,68,0.1); color: #ef4444; }

        /* ─── Add Task Buttons (two-button layout) ──── */
        .add-task-buttons { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .add-task-buttons button {
            flex: 1; padding: 0.5rem; border: 1px dashed var(--card-border);
            border-radius: 10px; background: transparent; color: var(--text-muted);
            cursor: pointer; font-size: 0.8rem; transition: all 0.2s; font-weight: 600;
        }
        .add-task-buttons button:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .add-task-buttons button.mail-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }

        /* ─── Mail Composer (selected state) ──────────── */
        .mail-composer.has-selection { border-color: var(--accent-blue); }
        .selected-task-banner {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.75rem; background: rgba(74,144,244,0.1);
            border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem;
        }
        .selected-task-banner .deselect-btn {
            margin-left: auto; background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 0.9rem;
        }
        .selected-task-banner .deselect-btn:hover { color: var(--text); }
        .btn-sent-confirm {
            background: var(--accent-green) !important; border-color: var(--accent-green) !important;
            color: #0f1117 !important; font-weight: 700;
        }
        .btn-response-received {
            background: var(--accent-purple) !important; border-color: var(--accent-purple) !important;
            color: white !important;
        }
        .task-type-badge {
            font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 4px;
            background: rgba(155,125,240,0.15); color: var(--accent-purple); font-weight: 600;
        }

        /* ─── Inbox Tab ──────────────────────────────── */
        .inbox-layout {
            display: flex; gap: 0; height: calc(100vh - 230px);
            background: var(--bg-surface); border: 1px solid var(--card-border);
            border-radius: var(--radius-md); overflow: hidden;
        }
        .inbox-list-panel {
            width: 380px; min-width: 300px; border-right: 1px solid var(--card-border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .inbox-reader-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .inbox-search {
            padding: 0.75rem; border-bottom: 1px solid var(--card-border);
        }
        .inbox-search input {
            width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); background: var(--progress-bg); color: var(--text);
            font-size: 0.8rem; font-family: inherit;
        }
        .inbox-search input:focus { outline: none; border-color: var(--accent-blue); }
        .inbox-filters {
            display: flex; gap: 0; padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--card-border);
        }
        .inbox-filter-btn {
            flex: 1; padding: 0.35rem 0.6rem; border: 1px solid var(--card-border);
            background: transparent; color: var(--text-muted); cursor: pointer;
            font-size: 0.75rem; font-weight: 600; transition: all 0.15s;
        }
        .inbox-filter-btn:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
        .inbox-filter-btn:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
        .inbox-filter-btn.active {
            background: rgba(137,180,250,0.1); border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        .inbox-list { flex: 1; overflow-y: auto; }
        .inbox-item {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; transition: background 0.12s;
        }
        .inbox-item:hover { background: rgba(137,180,250,0.04); }
        .inbox-item.selected { background: rgba(137,180,250,0.08); border-left: 2px solid var(--accent-blue); }
        .inbox-item.unread .inbox-item-from,
        .inbox-item.unread .inbox-item-subject { font-weight: 700; color: var(--text); }
        .inbox-item-dot {
            width: 8px; height: 8px; min-width: 8px; border-radius: 50%;
            background: transparent;
        }
        .inbox-item.unread .inbox-item-dot { background: var(--accent-blue); }
        .inbox-item-star {
            cursor: pointer; font-size: 0.9rem; opacity: 0.3; transition: opacity 0.15s;
        }
        .inbox-item-star:hover { opacity: 0.8; }
        .inbox-item-star.starred { opacity: 1; color: #f59e0b; }
        .inbox-item-content { flex: 1; min-width: 0; }
        .inbox-item-top { display: flex; justify-content: space-between; align-items: baseline; }
        .inbox-item-from {
            font-size: 0.85rem; color: var(--text-muted); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 180px;
        }
        .inbox-item-date { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; }
        .inbox-item-subject {
            font-size: 0.85rem; color: var(--text-muted); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .inbox-item-preview {
            font-size: 0.75rem; color: var(--text-muted); opacity: 0.6;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .inbox-item-attach {
            font-size: 0.7rem; color: var(--text-muted); opacity: 0.5;
        }
        .inbox-reader {
            flex: 1; overflow-y: auto; padding: 0;
        }
        .inbox-reader-empty {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; color: var(--text-muted);
            gap: 0.5rem;
        }
        .inbox-reader-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--card-border);
        }
        .inbox-reader-subject {
            font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem;
        }
        .inbox-reader-meta {
            display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem;
            font-size: 0.85rem; color: var(--text-muted);
        }
        .inbox-reader-meta strong { color: var(--text); }
        .inbox-reader-actions {
            display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;
        }
        .inbox-reader-actions button {
            padding: 0.4rem 0.8rem; border: 1px solid var(--card-border); border-radius: 8px;
            background: var(--progress-bg); color: var(--text-muted); cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: all 0.15s;
        }
        .inbox-reader-actions button:hover {
            border-color: var(--accent-blue); color: var(--text);
            background: rgba(74,144,244,0.1);
        }
        .inbox-reader-actions button.danger:hover {
            border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1);
        }
        .inbox-reader-body {
            padding: 1.5rem; font-size: 0.9rem; line-height: 1.7;
            white-space: pre-wrap; word-break: break-word;
            color: var(--text); user-select: text; -webkit-user-select: text;
        }
        .inbox-reader-attach {
            padding: 0 1.5rem 1.5rem;
        }
        .inbox-reader-attach h4 {
            font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;
        }
        .inbox-reader-attach .att-item {
            display: inline-block; padding: 0.3rem 0.6rem; margin: 0.2rem;
            background: rgba(74,144,244,0.1); border-radius: 6px;
            font-size: 0.75rem; color: var(--accent-blue);
        }
        .inbox-status {
            padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1rem;
            font-size: 0.85rem; font-weight: 600;
        }
        .inbox-status.success { background: rgba(45,212,168,0.15); color: var(--accent-green); }
        .inbox-status.error { background: rgba(239,68,68,0.15); color: #ef4444; }
        .inbox-status.loading { background: rgba(74,144,244,0.15); color: var(--accent-blue); }

        /* ─── Account Form ────────────────────────────── */
        .account-card {
            background: var(--progress-bg); border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); padding: 0.75rem; margin-bottom: 0.5rem; position: relative;
        }
        .account-card .account-delete {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background: none; border: none; cursor: pointer; color: var(--text-muted);
            font-size: 1rem; opacity: 0.5; transition: opacity 0.15s;
        }
        .account-card .account-delete:hover { opacity: 1; color: #ef4444; }
        .account-card .form-group { margin-bottom: 0.75rem; }
        .account-card .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        }
        .account-card .form-group label {
            display: block; font-size: 0.75rem; color: var(--text-muted);
            margin-bottom: 0.2rem; font-weight: 600;
        }
        .account-card input[type="text"],
        .account-card input[type="password"],
        .account-card input[type="number"] {
            width: 100%; padding: 0.35rem 0.5rem; border: 1px solid var(--card-border);
            border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text);
            font-size: 0.78rem; font-family: inherit;
        }
        .account-card input:focus { outline: none; border-color: var(--accent-blue); }
        .account-card .account-toggle {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem; color: var(--text-muted); cursor: pointer;
        }

        /* ─── Responsive ─────────────────────────────── */
        @media (max-width: 600px) {
            body { padding: 1rem 0.5rem; }
            .section-header { padding: 1rem; }
            .task-list { padding: 0 0.5rem 0.75rem; }
            .global-progress { padding: 1rem 1.25rem; }
            header h1 { font-size: 1.4rem; }
            .emoji-grid { grid-template-columns: repeat(8, 1fr); }
            .tab-btn { font-size: 0.85rem; padding: 0.7rem 0.5rem; }
        }
    </style>
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
</head>
<body>

<!-- ─── Custom Titlebar ────────────────────────── -->
<div class="titlebar" id="titlebar">
    <span class="titlebar-icon"><i class="lucide-terminal"></i></span>
    <span class="titlebar-title">NexoMail</span>
    <div class="titlebar-controls">
        <button class="titlebar-btn" id="btn-minimize" title="Réduire">
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="titlebar-btn" id="btn-maximize" title="Agrandir">
            <svg viewBox="0 0 24 24" id="maximize-icon"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
        </button>
        <button class="titlebar-btn close" id="btn-close" title="Fermer">
            <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
    </div>
</div>

<div class="app-content" id="app-content">
<canvas id="confetti"></canvas>

<div class="container">
    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('todo')"><i class="lucide-list-checks"></i> Todo</button>
        <button class="tab-btn" onclick="switchTab('inbox')"><i class="lucide-inbox"></i> Inbox</button>
        <button class="tab-btn" onclick="switchTab('mail')"><i class="lucide-send"></i> Mail</button>
        <button class="tab-btn" onclick="switchTab('graph')"><i class="lucide-network"></i> Graph</button>
    </div>

    <!-- TODO TAB -->
    <div class="tab-content active" id="tab-todo">
        <div id="app"></div>
    </div>

    <!-- INBOX TAB -->
    <div class="tab-content" id="tab-inbox">
        <header>
            <h1><i class="lucide-inbox"></i> Boîte de réception</h1>
            <div class="header-actions">
                <button onclick="fetchEmails()"><i class="lucide-refresh-cw"></i> Relever</button>
                <button onclick="openAccountsModal()"><i class="lucide-user"></i> Comptes</button>
                <button onclick="exportAllObsidian()"><i class="lucide-book-open"></i> Exporter Obsidian</button>
            </div>
        </header>

        <div id="inbox-status" style="display:none" class="inbox-status"></div>

        <div class="inbox-layout">
            <div class="inbox-list-panel" id="inboxListPanel">
                <div class="inbox-search">
                    <input type="text" id="inboxSearch" placeholder="Rechercher dans les mails…" oninput="filterInbox()">
                </div>
                <div class="inbox-filters">
                    <button class="inbox-filter-btn active" onclick="setInboxFilter('all', this)">Tous</button>
                    <button class="inbox-filter-btn" onclick="setInboxFilter('unread', this)">Non lus</button>
                    <button class="inbox-filter-btn" onclick="setInboxFilter('starred', this)"><i class="lucide-star"></i></button>
                </div>
                <div id="inboxList" class="inbox-list"></div>
            </div>
            <div class="inbox-reader-panel" id="inboxReaderPanel">
                <div id="inboxReader" class="inbox-reader">
                    <div class="inbox-reader-empty">
                        <i class="lucide-mail-open" style="font-size:2.5rem;color:var(--text-muted)"></i>
                        <p>Sélectionne un mail pour le lire</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIL TAB -->
    <div class="tab-content" id="tab-mail">
        <!-- Timeline -->
        <div class="timeline-container" id="timeline-container"></div>

        <!-- Pending Mail List -->
        <div class="mail-pending-list" id="mail-pending-list"></div>

        <!-- Mail Composer -->
        <div class="mail-composer" id="mailComposer">
            <div id="selectedTaskBanner"></div>
            <h2><i class="lucide-pen-line"></i> Rédiger un mail</h2>
            <div class="mail-field">
                <label>Expéditeur</label>
                <select id="mailFrom">
                    <option value="isen.naiken@nexomedis.com">isen.naiken@nexomedis.com</option>
                    <option value="isen.naiken@revue-ia-sante.fr">isen.naiken@revue-ia-sante.fr</option>
                    <option value="redaction@revue-ia-sante.fr">redaction@revue-ia-sante.fr</option>
                    <option value="Isen_Naiken@etu.ube.fr">Isen_Naiken@etu.ube.fr</option>
                    <option value="isennaiken3@gmail.com">isennaiken3@gmail.com</option>
                </select>
            </div>

<script>
/* ═══════════════════════════════════════════════════════
   State & Config
   ═══════════════════════════════════════════════════════ */
let state = { sections: [], settings: { geminiKey: '' }, reminders: [], mailEvents: [] };
let editMode = false;
let editingSectionId = null;
let dragData = null;
let contacts = [];
let currentTab = 'todo';
let currentReminder = null;
let selectedMailTask = null;
let timelineMonth = new Date();

const uid = () => Math.random().toString(36).slice(2, 10);
const esc = s => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

const EMOJIS = [
    '📋','📌','📞','💼','🤝','💻','🚀','🗂️','📊','💡',
    '🎯','🔧','⚡','🏆','📝','✨','🌟','💎','🔬','🎨',
    '📚','🔔','🏠','💰','🎓','🧪','🌍','🛠️','📦','🎪',
    '🧩','💬','📐','🔑','🏗️','⏰','🧲','🎶','🖥️','❤️',
    '🔥','🌈','🍀','💪','🧠','👁️','🎁','📱','🌐','🔗',
    '💊','🩺','📈','🔒','🛡️','⭐','💫','🎭','🧬','🔎'
];
const COLORS = ['blue', 'orange', 'green', 'purple', 'pink', 'slate'];
const COLOR_HEX = {
    blue: '#6c8aff', orange: '#f59e0b', green: '#34d399',
    purple: '#a78bfa', pink: '#f472b6', slate: '#94a3b8'
};
let modalEmoji = '📋';
let modalColor = 'blue';

/* ═══════════════════════════════════════════════════════
   Tab Switching
   ═══════════════════════════════════════════════════════ */
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active',
            (i === 0 && tab === 'todo') ||
            (i === 1 && tab === 'inbox') ||
            (i === 2 && tab === 'mail') ||
            (i === 3 && tab === 'graph')
        );
    });
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'mail') renderMailTab();
    if (tab === 'inbox') loadInbox();
    if (tab === 'graph') initGraphIfNeeded();
}

/* ═══════════════════════════════════════════════════════
   API Layer
   ═══════════════════════════════════════════════════════ */
let saveTimer;

async function loadState() {
    try {
        const r = await fetch('/api/state');
        if (r.ok) {
            const data = await r.json();
            if (data.sections) state = data;
        }
    } catch {
        try {
            const raw = localStorage.getItem('todo-state');
            if (raw) state = JSON.parse(raw);
        } catch {}
    }
    if (!state.sections) state.sections = [];
    if (!state.settings) state.settings = { geminiKey: '' };
    if (!state.reminders) state.reminders = [];
    if (!state.mailEvents) state.mailEvents = [];
    // Migration: convert old isMail flag to type field, old dismissed to status
    state.sections.forEach(s => {
        s.tasks.forEach(t => {
            if (!t.type) t.type = t.isMail ? 'mail' : 'task';
        });
    });
    state.reminders.forEach(r => {
        if (!r.status) r.status = r.dismissed ? 'dismissed' : 'pending';
        if (!r.cycle) r.cycle = 1;
    });
}

async function loadContacts() {
    try {
        const r = await fetch('/api/contacts');
        if (r.ok) contacts = await r.json();
    } catch {}
}

function autoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
        try {
            await fetch('/api/state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(state)
            });
        } catch {
            localStorage.setItem('todo-state', JSON.stringify(state));
        }
    }, 400);
}

/* ═══════════════════════════════════════════════════════
   Rendering
   ═══════════════════════════════════════════════════════ */
function render() {
    const app = document.getElementById('app');
    const scrollY = window.scrollY;
    app.innerHTML = renderHeader() + renderProgress() + renderSections()
        + (editMode ? '<button class="add-section-btn" onclick="openSectionModal()">+ Nouvelle section</button>' : '');
    updateProgress();
    setupDragDrop();
    window.scrollTo(0, scrollY);
}

function renderHeader() {
    return `
    <header>
        <h1><i class="lucide-list-checks"></i> Plan d'action</h1>
        <div class="header-actions">
            <button onclick="toggleEdit()" class="${editMode ? 'active' : ''}">
                ${editMode ? '<i class="lucide-check"></i> Terminer' : '<i class="lucide-pencil"></i> Éditer'}
            </button>
            <button onclick="openSettings()"><i class="lucide-settings"></i></button>
        </div>
    </header>`;
}

function renderProgress() {
    return `
    <div class="global-progress">
        <div class="global-progress-header">
            <span>Progression globale</span>
            <span class="counter"><strong id="gDone">0</strong> / <span id="gTotal">0</span> tâches</span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="gBar"></div>
        </div>
        <div class="progress-percent" id="gPercent">0 %</div>
    </div>`;
}

function renderSections() {
    return state.sections.map(s => {
        const tasksHtml = s.tasks.map(t => renderTask(t, s.id)).join('');
        const editBtns = editMode ? `
            <button class="btn-icon" onclick="event.stopPropagation();openSectionModal('${s.id}')" title="Modifier"><i class="lucide-pencil"></i></button>
            <button class="btn-icon" onclick="event.stopPropagation();deleteSection('${s.id}')" title="Supprimer"><i class="lucide-trash-2"></i></button>
        ` : '';
        const desc = s.description
            ? `<p class="section-desc" data-desc="${s.id}" ${s.collapsed ? 'style="display:none"' : ''}>${esc(s.description)}</p>`
            : '';
        const addBtns = editMode
            ? `<div class="add-task-buttons">
                <button onclick="addTask('${s.id}','task')">+ Tâche</button>
                <button class="mail-btn" onclick="addTask('${s.id}','mail')"><i class="lucide-mail"></i> + Mail</button>
               </div>`
            : '';
        return `
        <div class="section" data-color="${esc(s.color)}" data-sid="${s.id}">
            <div class="section-header" onclick="onSectionClick('${s.id}')">
                <span class="section-title">
                    ${s.emoji} ${esc(s.title)}
                    <span class="section-badge">${esc(s.badge || '')}</span>
                </span>
                <div class="section-header-right">
                    ${editBtns}
                    <div class="section-progress-mini">
                        <div class="mini-bar"><div class="mini-fill" data-sfill="${s.id}"></div></div>
                        <span class="mini-text" data-stext="${s.id}">0%</span>
                    </div>
                </div>
            </div>
            ${desc}
            <div class="task-list" data-slist="${s.id}" ${s.collapsed ? 'style="display:none"' : ''}>
                ${tasksHtml}
                ${addBtns}
            </div>
        </div>`;
    }).join('');
}

function renderTask(t, sid) {
    const cls = [
        'task-item',
        t.done ? 'checked' : '',
        t.indent ? 'sub-task' : '',
        (t.type === 'mail' || t.isMail) ? 'is-mail' : ''
    ].filter(Boolean).join(' ');

    const check = `<div class="custom-check" onclick="toggleTask('${sid}','${t.id}')">
        <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>`;

    if (editMode) {
        const typeBadge = (t.type === 'mail' || t.isMail)
            ? '<span class="task-type-badge"><i class="lucide-mail"></i> Mail</span>'
            : '';
        return `
        <div class="${cls}" data-sid="${sid}" data-tid="${t.id}" draggable="true">
            ${check}
            <div class="task-edit-fields">
                <input type="text" class="task-input" value="${esc(t.label)}"
                    onchange="updateTask('${sid}','${t.id}','label',this.value)"
                    onkeydown="if(event.key==='Enter'){this.blur()}">
                <input type="text" class="task-note-input" value="${esc(t.note || '')}"
                    placeholder="Note (optionnel)"
                    onchange="updateTask('${sid}','${t.id}','note',this.value)"
                    onkeydown="if(event.key==='Enter'){this.blur()}">
            </div>
            <div class="edit-actions">
                ${typeBadge}
                <button class="btn-icon" onclick="toggleIndent('${sid}','${t.id}')" title="Indenter / Désindenter">↔</button>
                <button class="btn-icon" onclick="deleteTask('${sid}','${t.id}')" title="Supprimer"><i class="lucide-trash-2"></i></button>
            </div>
        </div>`;
    }

    return `
    <div class="${cls}" data-sid="${sid}" data-tid="${t.id}" draggable="true">
        ${check}
        <span class="task-label" onclick="toggleTask('${sid}','${t.id}')">
            ${esc(t.label)}${t.note ? `<span class="task-note">${esc(t.note)}</span>` : ''}
        </span>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   Progress
   ═══════════════════════════════════════════════════════ */
function updateProgress() {
    let total = 0, done = 0;
    state.sections.forEach(s => {
        let st = 0, sd = 0;
        s.tasks.forEach(t => { st++; total++; if (t.done) { sd++; done++; } });
        const sp = st ? Math.round((sd / st) * 100) : 0;
        const fill = document.querySelector(`[data-sfill="${s.id}"]`);
        const text = document.querySelector(`[data-stext="${s.id}"]`);
        if (fill) fill.style.width = sp + '%';
        if (text) text.textContent = sp + '%';
    });
    const pct = total ? Math.round((done / total) * 100) : 0;
    const gDone = document.getElementById('gDone');
    const gTotal = document.getElementById('gTotal');
    const gBar = document.getElementById('gBar');
    const gPercent = document.getElementById('gPercent');
    if (gDone) gDone.textContent = done;
    if (gTotal) gTotal.textContent = total;
    if (gBar) gBar.style.width = pct + '%';
    if (gPercent) gPercent.textContent = pct + ' %';
    if (pct === 100 && total > 0) launchConfetti();
}

/* ═══════════════════════════════════════════════════════
   Task Operations
   ═══════════════════════════════════════════════════════ */
function toggleTask(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t.done = !t.done;

    // For mail tasks, sync with sent status
    if (t.type === 'mail' || t.isMail) {
        if (t.done && !t.sentAt) {
            markMailTaskSent(sid, tid);
        } else if (!t.done && t.sentAt) {
            unmarkMailTaskSent(sid, tid);
        }
    }

    const el = document.querySelector(`[data-sid="${sid}"][data-tid="${tid}"]`);
    if (el) el.classList.toggle('checked', t.done);
    updateProgress();
    autoSave();
    if (currentTab === 'mail') renderMailTab();
}

function updateTask(sid, tid, field, value) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t[field] = value;
    autoSave();
}

function addTask(sid, type) {
    type = type || 'task';
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    s.tasks.push({
        id: uid(), label: '', note: '', done: false, indent: 0,
        type: type, isMail: type === 'mail',
        mailTo: '', mailFrom: '', mailSubject: '', mailBody: '',
        sentAt: null, respondedAt: null
    });
    render();
    autoSave();
    const inputs = document.querySelectorAll(`[data-sid="${sid}"] .task-input`);
    if (inputs.length) inputs[inputs.length - 1].focus();
}

function deleteTask(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    s.tasks = s.tasks.filter(t => t.id !== tid);
    render();
    autoSave();
}

function toggleIndent(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t.indent = t.indent ? 0 : 1;
    render();
    autoSave();
}

/* ═══════════════════════════════════════════════════════
   Section Operations
   ═══════════════════════════════════════════════════════ */
function onSectionClick(sid) {
    if (editMode) return;
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    s.collapsed = !s.collapsed;
    const list = document.querySelector(`[data-slist="${s.id}"]`);
    const desc = document.querySelector(`[data-desc="${s.id}"]`);
    if (list) list.style.display = s.collapsed ? 'none' : '';
    if (desc) desc.style.display = s.collapsed ? 'none' : '';
    autoSave();
}

function deleteSection(sid) {
    if (!confirm('Supprimer cette section et toutes ses tâches ?')) return;
    state.sections = state.sections.filter(s => s.id !== sid);
    render();
    autoSave();
}

/* ═══════════════════════════════════════════════════════
   Edit Mode
   ═══════════════════════════════════════════════════════ */
function toggleEdit() {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    render();
}

/* ═══════════════════════════════════════════════════════
   Drag & Drop
   ═══════════════════════════════════════════════════════ */
function setupDragDrop() {
    document.querySelectorAll('.task-item[draggable]').forEach(el => {
        el.addEventListener('dragstart', e => {
            dragData = { sid: el.dataset.sid, tid: el.dataset.tid };
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => {
            el.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
            dragData = null;
        });
    });

    document.querySelectorAll('.section').forEach(sec => {
        sec.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            sec.classList.add('drag-over');
        });
        sec.addEventListener('dragleave', e => {
            if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over');
        });
        sec.addEventListener('drop', e => {
            e.preventDefault();
            sec.classList.remove('drag-over');
            if (!dragData) return;
            const targetSid = sec.dataset.sid;
            if (dragData.sid === targetSid) return;
            const from = state.sections.find(s => s.id === dragData.sid);
            const to = state.sections.find(s => s.id === targetSid);
            if (!from || !to) return;
            const idx = from.tasks.findIndex(t => t.id === dragData.tid);
            if (idx === -1) return;
            const [task] = from.tasks.splice(idx, 1);
            to.tasks.push(task);
            render();
            autoSave();
            showToast('Tâche déplacée', 'success', 1500);
        });
    });
}

/* ═══════════════════════════════════════════════════════
   Contact Autocomplete (multi-recipient)
   ═══════════════════════════════════════════════════════ */
let mailRecipients = [];

function renderMailTags() {
    const container = document.getElementById('mailToTags');
    const input = document.getElementById('mailToInput');
    container.querySelectorAll('.email-tag').forEach(t => t.remove());
    mailRecipients.forEach((email, i) => {
        const tag = document.createElement('span');
        tag.className = 'email-tag';
        const c = contacts.find(c => c.email === email);
        tag.innerHTML = `${esc(c ? c.name : email)}<span class="tag-remove" onclick="removeRecipient(${i})">&times;</span>`;
        tag.title = email;
        container.insertBefore(tag, input);
    });
}

function addRecipient(email) {
    email = email.trim();
    if (!email || mailRecipients.includes(email)) return;
    mailRecipients.push(email);
    renderMailTags();
    const input = document.getElementById('mailToInput');
    input.value = '';
    document.getElementById('contactList').classList.remove('show');
}

function removeRecipient(index) {
    mailRecipients.splice(index, 1);
    renderMailTags();
}

function getMailToValue() {
    return mailRecipients.join(', ');
}

function onContactInput() {
    const input = document.getElementById('mailToInput');
    const list = document.getElementById('contactList');
    const val = input.value.toLowerCase().trim();
    if (!val || val.length < 1) { list.classList.remove('show'); return; }
    const matches = contacts.filter(c =>
        !mailRecipients.includes(c.email) &&
        (c.name.toLowerCase().includes(val) || c.email.toLowerCase().includes(val))
    ).slice(0, 10);
    if (!matches.length) { list.classList.remove('show'); return; }
    list.innerHTML = matches.map(c =>
        `<div class="autocomplete-item" onclick="selectContact('${esc(c.email)}')">
            <span class="ac-name">${esc(c.name)}</span>
            <span class="ac-email">${esc(c.email)}</span>
        </div>`
    ).join('');
    list.classList.add('show');
}

function selectContact(email) {
    addRecipient(email);
}

function onTagKeydown(e) {
    const input = document.getElementById('mailToInput');
    if ((e.key === 'Enter' || e.key === ',' || e.key === 'Tab') && input.value.trim()) {
        e.preventDefault();
        addRecipient(input.value.replace(/,/g, '').trim());
    }
    if (e.key === 'Backspace' && !input.value && mailRecipients.length) {
        removeRecipient(mailRecipients.length - 1);
    }
}

// Close autocomplete on outside click
document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrapper')) {
        const list = document.getElementById('contactList');
        if (list) list.classList.remove('show');
    }
});

async function reformulateMail() {
    const body = document.getElementById('mailBody').value.trim();
    if (!body) { showToast('Écris un message d\'abord.', 'error'); return; }
    if (!state.settings.geminiKey) {
        showToast('Configure ta clé API Gemini dans les paramètres', 'error', 3000);
        openSettings();
        return;
    }
    showLoading('L\'IA reformule ton message…');
    try {
        const r = await fetch('/api/reformulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: state.settings.geminiKey, text: body })
        });
        const result = await r.json();
        if (result.error) {
            showToast('Erreur IA : ' + result.error, 'error', 5000);
        } else if (result.text) {
            document.getElementById('mailBody').value = result.text;
            showToast('Message reformulé !', 'success');
        }
    } catch (e) {
        showToast('Erreur : ' + e.message, 'error', 5000);
    } finally {
        hideLoading();
    }
}
