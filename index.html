<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo & Mail</title>
    <style>
        /* ─── Deep Medical Theme — Variables & Reset ──── */
        :root {
            --bg: #0d0f14;
            --bg-surface: #12151c;
            --card: #171b26;
            --card-border: #1f2533;
            --card-hover: #1c2130;
            --text: #e4e7ef;
            --text-muted: #6b7394;
            --accent-blue: #4a90f4;
            --accent-blue-glow: rgba(74, 144, 244, 0.15);
            --accent-green: #2dd4a8;
            --accent-orange: #f0a030;
            --accent-purple: #9b7df0;
            --accent-pink: #e86ca0;
            --accent-slate: #7e8ba8;
            --progress-bg: #1a1f2e;
            --checked: #2dd4a8;
            --titlebar-bg: #0a0c10;
            --titlebar-border: #1a1e2a;
            --titlebar-btn-hover: rgba(255,255,255,0.06);
            --titlebar-close-hover: #e04040;
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.45);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ─── Scrollbar Hiding & Custom ────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Re-enable selection on editable content */
        input, textarea, [contenteditable], .task-label, .terminal-output, .mail-field textarea, .mail-field input {
            user-select: text;
            -webkit-user-select: text;
        }

        /* ─── Custom Titlebar ─────────────────────────── */
        .titlebar {
            display: flex;
            align-items: center;
            height: 38px;
            background: var(--titlebar-bg);
            border-bottom: 1px solid var(--titlebar-border);
            -webkit-app-region: drag;
            app-region: drag;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50000;
            padding: 0 8px;
            gap: 10px;
        }
        .titlebar-icon {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            -webkit-app-region: no-drag;
        }
        .titlebar-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex: 1;
        }
        .titlebar-controls {
            display: flex;
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }
        .titlebar-btn {
            width: 46px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .titlebar-btn:hover {
            background: var(--titlebar-btn-hover);
            color: var(--text);
        }
        .titlebar-btn.close:hover {
            background: var(--titlebar-close-hover);
            color: #fff;
        }
        .titlebar-btn svg {
            width: 16px; height: 16px;
            stroke: currentColor; stroke-width: 1.5;
            fill: none;
        }

        /* ─── App Content Area (below titlebar) ────────── */
        .app-content {
            margin-top: 38px;
            height: calc(100vh - 38px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* ─── Layout ─────────────────────────────────── */
        .container { max-width: 900px; margin: 0 auto; }

        /* ─── Tabs ───────────────────────────────────── */
        .tab-bar {
            display: flex; gap: 0; justify-content: center; margin-bottom: 2rem;
            background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
            overflow: hidden;
        }
        .tab-btn {
            flex: 1; padding: 0.85rem 1.5rem; border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; font-size: 1rem; font-weight: 600;
            transition: all 0.2s; text-align: center;
        }
        .tab-btn:hover { background: rgba(108,138,255,0.08); color: var(--text); }
        .tab-btn.active {
            background: rgba(108,138,255,0.2); color: var(--accent-blue);
            box-shadow: inset 0 -3px 0 var(--accent-blue);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ─── Header ─────────────────────────────────── */
        header { text-align: center; margin-bottom: 2.5rem; }
        header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .header-actions {
            display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.75rem; flex-wrap: wrap;
        }
        .header-actions button, .mail-actions button {
            padding: 0.5rem 1rem; border: 1px solid var(--card-border); border-radius: 10px;
            background: var(--card); color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
        }
        .header-actions button:hover, .mail-actions button:hover {
            background: rgba(108,138,255,0.15); border-color: var(--accent-blue); color: var(--text);
        }
        .header-actions button.active {
            background: rgba(108,138,255,0.2); border-color: var(--accent-blue); color: var(--accent-blue);
        }

        /* ─── Global Progress ────────────────────────── */
        .global-progress {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
            padding: 1.5rem 2rem; margin-bottom: 2.5rem; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(12px);
        }
        .global-progress-header {
            display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem;
        }
        .global-progress-header span:first-child { font-weight: 600; font-size: 1rem; }
        .global-progress-header .counter { font-size: 0.9rem; color: var(--text-muted); }
        .global-progress-header .counter strong { color: var(--accent-green); }
        .progress-bar-track {
            width: 100%; height: 10px; background: var(--progress-bg);
            border-radius: 99px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            transition: width 0.5s ease; width: 0%;
        }
        .progress-percent { text-align: right; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.35rem; }

        /* ─── Section ────────────────────────────────── */
        .section {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
            margin-bottom: 1.5rem; overflow: hidden; transition: box-shadow 0.3s, outline 0.2s;
        }
        .section:hover { box-shadow: 0 0 30px var(--accent-blue-glow); }
        .section-header {
            padding: 1.25rem 1.5rem; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; user-select: none;
        }
        .section-header:hover { background: rgba(255,255,255,0.02); }
        body.edit-mode .section-header { cursor: default; }
        body.edit-mode .section-header:hover { background: transparent; }
        .section-title { font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .section-badge {
            font-size: 0.75rem; padding: 0.15rem 0.6rem; border-radius: 99px; font-weight: 600;
        }
        .section-desc {
            padding: 0 1.5rem; font-size: 0.85rem; color: var(--text-muted);
            font-style: italic; margin-bottom: 0.5rem;
        }
        .section-header-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
        .section-progress-mini { width: 120px; display: flex; align-items: center; gap: 0.6rem; }
        .section-progress-mini .mini-bar {
            flex: 1; height: 5px; background: var(--progress-bg); border-radius: 99px; overflow: hidden;
        }
        .section-progress-mini .mini-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; width: 0%; }
        .section-progress-mini .mini-text { font-size: 0.75rem; color: var(--text-muted); min-width: 32px; text-align: right; }

        /* ─── Colors Per Section ─────────────────────── */
        .section[data-color="blue"] .section-title { color: var(--accent-blue); }
        .section[data-color="blue"] .section-badge { background: rgba(108,138,255,0.15); color: var(--accent-blue); }
        .section[data-color="blue"] .mini-fill { background: var(--accent-blue); }
        .section[data-color="orange"] .section-title { color: var(--accent-orange); }
        .section[data-color="orange"] .section-badge { background: rgba(245,158,11,0.15); color: var(--accent-orange); }
        .section[data-color="orange"] .mini-fill { background: var(--accent-orange); }
        .section[data-color="green"] .section-title { color: var(--accent-green); }
        .section[data-color="green"] .section-badge { background: rgba(52,211,153,0.15); color: var(--accent-green); }
        .section[data-color="green"] .mini-fill { background: var(--accent-green); }
        .section[data-color="purple"] .section-title { color: var(--accent-purple); }
        .section[data-color="purple"] .section-badge { background: rgba(167,139,250,0.15); color: var(--accent-purple); }
        .section[data-color="purple"] .mini-fill { background: var(--accent-purple); }
        .section[data-color="pink"] .section-title { color: var(--accent-pink); }
        .section[data-color="pink"] .section-badge { background: rgba(244,114,182,0.15); color: var(--accent-pink); }
        .section[data-color="pink"] .mini-fill { background: var(--accent-pink); }
        .section[data-color="slate"] .section-title { color: var(--accent-slate); }
        .section[data-color="slate"] .section-badge { background: rgba(148,163,184,0.15); color: var(--accent-slate); }
        .section[data-color="slate"] .mini-fill { background: var(--accent-slate); }

        /* ─── Tasks ──────────────────────────────────── */
        .task-list { padding: 0 1rem 1rem; }
        .task-item {
            display: flex; align-items: flex-start; gap: 0.75rem;
            padding: 0.7rem 0.75rem; border-radius: 10px; transition: background 0.15s;
        }
        .task-item:hover { background: rgba(255,255,255,0.025); }
        .task-item.checked .task-label { text-decoration: line-through; color: var(--text-muted); }
        .task-item.checked .custom-check { background: var(--checked); border-color: var(--checked); }
        .task-item.checked .custom-check svg { opacity: 1; }
        .task-item.sub-task { margin-left: 2rem; }
        .task-item.is-mail .task-label::before { content: '📧 '; }
        .custom-check {
            width: 22px; height: 22px; min-width: 22px; border: 2px solid var(--card-border);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; margin-top: 2px;
        }
        .custom-check:hover { border-color: var(--accent-blue); }
        .custom-check svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.2s; stroke: white; stroke-width: 3; fill: none; }
        .task-label { font-size: 0.95rem; cursor: pointer; flex: 1; transition: color 0.3s; }
        .task-note { display: block; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.15rem; font-style: italic; }

        /* ─── Edit Mode ──────────────────────────────── */
        .task-edit-fields { flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
        .task-input, .task-note-input {
            width: 100%; padding: 0.4rem 0.6rem; border: 1px solid var(--card-border);
            border-radius: 8px; background: var(--progress-bg); color: var(--text);
            font-size: 0.9rem; font-family: inherit;
        }
        .task-note-input { font-size: 0.8rem; color: var(--text-muted); }
        .task-input:focus, .task-note-input:focus { outline: none; border-color: var(--accent-blue); }
        .btn-icon {
            background: none; border: none; cursor: pointer; font-size: 0.85rem;
            padding: 0.3rem; opacity: 0.5; transition: opacity 0.2s;
        }
        .btn-icon:hover { opacity: 1; }
        .edit-actions { display: flex; gap: 0.2rem; align-items: flex-start; margin-top: 2px; }
        .add-task-btn {
            width: 100%; padding: 0.6rem; border: 1px dashed var(--card-border);
            border-radius: 10px; background: transparent; color: var(--text-muted);
            cursor: pointer; font-size: 0.85rem; transition: all 0.2s; margin-top: 0.5rem;
        }
        .add-task-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .add-section-btn {
            width: 100%; padding: 1rem; border: 1px dashed var(--card-border);
            border-radius: 16px; background: transparent; color: var(--text-muted);
            cursor: pointer; font-size: 1rem; transition: all 0.2s; margin-top: 1rem;
        }
        .add-section-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ─── Drag & Drop ────────────────────────────── */
        .task-item[draggable="true"] { cursor: grab; }
        .task-item.dragging { opacity: 0.3; }
        .section.drag-over { outline: 2px dashed var(--accent-blue); outline-offset: -2px; }

        /* ─── Modal ──────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
            padding: 2rem; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { margin-bottom: 1.5rem; font-size: 1.2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; font-weight: 600; }
        .form-group input[type="text"], .form-group input[type="password"] {
            width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--card-border);
            border-radius: 10px; background: var(--progress-bg); color: var(--text);
            font-size: 0.9rem; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: var(--accent-blue); }
        .form-group small { display: block; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
        .modal-actions button {
            padding: 0.6rem 1.2rem; border: 1px solid var(--card-border); border-radius: 10px;
            background: var(--progress-bg); color: var(--text-muted); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
        }
        .modal-actions button:hover { border-color: var(--accent-blue); color: var(--text); }
        .btn-primary { background: var(--accent-blue) !important; border-color: var(--accent-blue) !important; color: white !important; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-danger { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; }

        /* ─── Emoji Picker ───────────────────────────── */
        .emoji-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0.3rem; max-height: 200px; overflow-y: auto; }
        .emoji-btn {
            width: 36px; height: 36px; border: 1px solid transparent; border-radius: 8px;
            background: none; cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; transition: all 0.15s;
        }
        .emoji-btn:hover { background: rgba(108,138,255,0.15); }
        .emoji-btn.selected { background: rgba(108,138,255,0.25); border-color: var(--accent-blue); }

        /* ─── Color Picker ───────────────────────────── */
        .color-picker { display: flex; gap: 0.75rem; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.selected { border-color: white; transform: scale(1.15); }

        /* ─── Loading ────────────────────────────────── */
        .loading-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15,17,23,0.85);
            z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column; gap: 1rem; backdrop-filter: blur(8px);
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner {
            width: 48px; height: 48px; border: 4px solid var(--card-border);
            border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { color: var(--text-muted); font-size: 0.95rem; }

        /* ─── Toast ──────────────────────────────────── */
        .toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 0.6rem 1.5rem; border-radius: 10px;
            font-weight: 600; font-size: 0.85rem; opacity: 0;
            transition: all 0.4s ease; z-index: 10000; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--accent-green); color: #0f1117; }
        .toast.error { background: #ef4444; color: white; }

        /* ─── Confetti ───────────────────────────────── */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        /* ─── Mail Tab ───────────────────────────────── */
        .mail-composer {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .mail-composer h2 { font-size: 1.2rem; margin-bottom: 1.25rem; color: var(--accent-blue); }
        .mail-field { margin-bottom: 1rem; }
        .mail-field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; font-weight: 600; }
        .mail-field select {
            width: 100%; background: var(--card); border: 1px solid var(--card-border);
            border-radius: 10px; padding: 0.6rem 0.8rem; color: var(--text);
            font-size: 0.9rem; cursor: pointer;
        }
        .mail-field select:focus { outline: none; border-color: var(--accent-blue); }
        .mail-field input, .mail-field textarea {
            width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--card-border);
            border-radius: 10px; background: var(--progress-bg); color: var(--text);
            font-size: 0.9rem; font-family: inherit; resize: vertical;
        }
        .mail-field textarea { min-height: 180px; line-height: 1.6; }
        .mail-field input:focus, .mail-field textarea:focus { outline: none; border-color: var(--accent-blue); }
        .mail-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .mail-actions button.accent-green { background: var(--accent-green) !important; border-color: var(--accent-green) !important; color: #0f1117 !important; }
        .mail-actions button.accent-purple { background: var(--accent-purple) !important; border-color: var(--accent-purple) !important; color: white !important; }
        .mail-actions button.accent-orange { background: var(--accent-orange) !important; border-color: var(--accent-orange) !important; color: #0f1117 !important; }

        /* ─── Autocomplete ───────────────────────────── */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 10px; max-height: 180px; overflow-y: auto;
            z-index: 500; display: none;
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item {
            padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.85rem;
            transition: background 0.15s; display: flex; justify-content: space-between;
        }
        .autocomplete-item:hover { background: rgba(108,138,255,0.15); }
        .autocomplete-item .ac-name { color: var(--text); }
        .autocomplete-item .ac-email { color: var(--text-muted); font-size: 0.8rem; }

        /* ─── Email Tags (multi-recipient) ────────────── */
        .email-tags-container {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem;
            width: 100%; background: var(--card); border: 1px solid var(--card-border);
            border-radius: 10px; padding: 0.45rem 0.6rem; min-height: 42px;
            cursor: text; transition: border-color 0.2s;
        }
        .email-tags-container:focus-within { border-color: var(--accent-blue); }
        .email-tag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            background: rgba(108,138,255,0.18); color: var(--accent-blue);
            border-radius: 6px; padding: 0.2rem 0.5rem; font-size: 0.8rem;
            max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .email-tag .tag-remove {
            cursor: pointer; font-size: 1rem; line-height: 1;
            opacity: 0.6; transition: opacity 0.15s; margin-left: 0.15rem;
        }
        .email-tag .tag-remove:hover { opacity: 1; }
        .email-tags-input {
            flex: 1; min-width: 120px; border: none; outline: none;
            background: transparent; color: var(--text); font-size: 0.9rem;
            padding: 0.15rem 0;
        }
        .email-tags-input::placeholder { color: var(--text-muted); }

        /* ─── Terminal Output ────────────────────────── */
        .terminal-output {
            background: #0d0d0d; border: 1px solid var(--card-border); border-radius: 12px;
            padding: 1rem; font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.8rem; color: #34d399; max-height: 400px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all; margin-top: 1rem;
        }

        /* ─── Reminder Banner ────────────────────────── */
        .reminder-banner {
            background: rgba(245,158,11,0.15); border: 1px solid var(--accent-orange);
            border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
        }
        .reminder-banner .reminder-text { flex: 1; font-size: 0.9rem; color: var(--accent-orange); }
        .reminder-banner button {
            padding: 0.4rem 0.8rem; border: 1px solid var(--accent-orange); border-radius: 8px;
            background: var(--accent-orange); color: #0f1117; cursor: pointer;
            font-size: 0.8rem; font-weight: 600;
        }
        .reminder-banner .btn-dismiss {
            background: transparent; color: var(--text-muted); border-color: var(--card-border);

        /* ─── Mail Pending List ──────────────────────── */
        .mail-pending-list {

        }
        .mail-pending-list h2 {

        .mail-pending-empty {

        .mail-item-actions { display: flex; gap: 0.3rem; }
        .mail-item-actions button {
            background: none; border: none; cursor: pointer; font-size: 0.8rem;
            padding: 0.2rem 0.4rem; border-radius: 4px; transition: background 0.15s; opacity: 0.5;
        }
        .mail-item-actions button:hover { opacity: 1; background: rgba(255,255,255,0.05); }

        /* ─── Timeline ──────────────────────────────── */
        .timeline-container {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
            margin-bottom: 1.5rem; overflow: hidden;
        }
        .timeline-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--card-border);
        }
        .timeline-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--accent-purple); margin: 0; }
        .timeline-nav { display: flex; gap: 0.5rem; }
        .timeline-nav button {
            background: var(--progress-bg); border: 1px solid var(--card-border); border-radius: 6px;
            color: var(--text-muted); cursor: pointer; padding: 0.25rem 0.6rem; font-size: 0.8rem;

        .timeline-nav button:hover { border-color: var(--accent-blue); color: var(--text); }
        .timeline-scroll { overflow-x: auto; padding: 1.5rem 1rem 1rem; }
        .timeline-track {
            display: flex; position: relative; min-width: max-content; padding-bottom: 0.5rem;
        }
        .timeline-day {
            display: flex; flex-direction: column; align-items: center; min-width: 44px; position: relative;

        }
        .timeline-line {
            position: absolute; top: 34px; left: 0; right: 0; height: 2px;
            background: var(--card-border); z-index: 0;
        }
        .timeline-dot {
            width: 14px; height: 14px; border-radius: 50%; position: relative; z-index: 1;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent;
        }
        .timeline-dot:hover { transform: scale(1.4); }
        .timeline-dot.empty { width: 6px; height: 6px; background: var(--card-border); cursor: default; border: none; }
        .timeline-dot.empty:hover { transform: none; }
        .timeline-dot.sent { background: var(--accent-blue); border-color: var(--accent-blue); }
        .timeline-dot.reminder-pending { background: var(--accent-slate); border-color: var(--accent-slate); }
        .timeline-dot.reminder-due {
            background: #ef4444; border-color: #ef4444;

        }
        .timeline-dot.reminder-sent { background: var(--accent-orange); border-color: var(--accent-orange); }
        .timeline-dot.response { background: var(--accent-green); border-color: var(--accent-green); }
        .timeline-dot.today-marker {

        /* ─── Responsive ─────────────────────────────── */

    </style>
</head>

<script>
/* ═══════════════════════════════════════════════════════
   State & Config
   ═══════════════════════════════════════════════════════ */
let state = { sections: [], settings: { geminiKey: '' }, reminders: [], mailEvents: [] };
let editMode = false;
let editingSectionId = null;
let dragData = null;
let contacts = [];
let currentTab = 'todo';
let currentReminder = null;
let selectedMailTask = null;
let timelineMonth = new Date();

const uid = () => Math.random().toString(36).slice(2, 10);
const esc = s => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

const EMOJIS = [
    '📋','📌','📞','💼','🤝','💻','🚀','🗂️','📊','💡',
    '🎯','🔧','⚡','🏆','📝','✨','🌟','💎','🔬','🎨',
    '📚','🔔','🏠','💰','🎓','🧪','🌍','🛠️','📦','🎪',
    '🧩','💬','📐','🔑','🏗️','⏰','🧲','🎶','🖥️','❤️',
    '🔥','🌈','🍀','💪','🧠','👁️','🎁','📱','🌐','🔗',
    '💊','🩺','📈','🔒','🛡️','⭐','💫','🎭','🧬','🔎'
];
const COLORS = ['blue', 'orange', 'green', 'purple', 'pink', 'slate'];
const COLOR_HEX = {
    blue: '#6c8aff', orange: '#f59e0b', green: '#34d399',
    purple: '#a78bfa', pink: '#f472b6', slate: '#94a3b8'
};
let modalEmoji = '📋';
let modalColor = 'blue';

/* ═══════════════════════════════════════════════════════
   Tab Switching
   ═══════════════════════════════════════════════════════ */
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'todo') || (i === 1 && tab === 'mail'));
    });
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'mail') renderMailTab();
}

/* ═══════════════════════════════════════════════════════
   API Layer
   ═══════════════════════════════════════════════════════ */
let saveTimer;

async function loadState() {
    try {
        const r = await fetch('/api/state');
        if (r.ok) {
            const data = await r.json();
            if (data.sections) state = data;
        }
    } catch {
        try {
            const raw = localStorage.getItem('todo-state');
            if (raw) state = JSON.parse(raw);
        } catch {}
    }
    if (!state.sections) state.sections = [];
    if (!state.settings) state.settings = { geminiKey: '' };
    if (!state.reminders) state.reminders = [];
    if (!state.mailEvents) state.mailEvents = [];
    // Migration: convert old isMail flag to type field, old dismissed to status
    state.sections.forEach(s => {
        s.tasks.forEach(t => {
            if (!t.type) t.type = t.isMail ? 'mail' : 'task';
        });
    });
    state.reminders.forEach(r => {
        if (!r.status) r.status = r.dismissed ? 'dismissed' : 'pending';
        if (!r.cycle) r.cycle = 1;
    });
}

async function loadContacts() {
    try {
        const r = await fetch('/api/contacts');
        if (r.ok) contacts = await r.json();
    } catch {}
}

function autoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
        try {
            await fetch('/api/state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(state)
            });
        } catch {
            localStorage.setItem('todo-state', JSON.stringify(state));
        }
    }, 400);
}

/* ═══════════════════════════════════════════════════════
   Rendering
   ═══════════════════════════════════════════════════════ */
function render() {
    const app = document.getElementById('app');
    const scrollY = window.scrollY;
    app.innerHTML = renderHeader() + renderProgress() + renderSections()
        + (editMode ? '<button class="add-section-btn" onclick="openSectionModal()">+ Nouvelle section</button>' : '');
    updateProgress();
    setupDragDrop();
    window.scrollTo(0, scrollY);
}

function renderHeader() {
    return `
    <header>
        <h1>📋 Plan d'action</h1>
        <div class="header-actions">
            <button onclick="toggleEdit()" class="${editMode ? 'active' : ''}">
                ${editMode ? '✅ Terminer' : '✏️ Éditer'}
            </button>
            <button onclick="openSettings()">⚙️</button>
        </div>
    </header>`;
}

function renderProgress() {
    return `
    <div class="global-progress">
        <div class="global-progress-header">
            <span>Progression globale</span>
            <span class="counter"><strong id="gDone">0</strong> / <span id="gTotal">0</span> tâches</span>
        </div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="gBar"></div>
        </div>
        <div class="progress-percent" id="gPercent">0 %</div>
    </div>`;
}

function renderSections() {
    return state.sections.map(s => {
        const tasksHtml = s.tasks.map(t => renderTask(t, s.id)).join('');
        const editBtns = editMode ? `
            <button class="btn-icon" onclick="event.stopPropagation();openSectionModal('${s.id}')" title="Modifier">✏️</button>
            <button class="btn-icon" onclick="event.stopPropagation();deleteSection('${s.id}')" title="Supprimer">🗑️</button>
        ` : '';
        const desc = s.description
            ? `<p class="section-desc" data-desc="${s.id}" ${s.collapsed ? 'style="display:none"' : ''}>${esc(s.description)}</p>`
            : '';
        const addBtns = editMode
            ? `<div class="add-task-buttons">
                <button onclick="addTask('${s.id}','task')">+ Tâche</button>
                <button class="mail-btn" onclick="addTask('${s.id}','mail')">📧 + Mail</button>
               </div>`
            : '';
        return `
        <div class="section" data-color="${esc(s.color)}" data-sid="${s.id}">
            <div class="section-header" onclick="onSectionClick('${s.id}')">
                <span class="section-title">
                    ${s.emoji} ${esc(s.title)}
                    <span class="section-badge">${esc(s.badge || '')}</span>
                </span>
                <div class="section-header-right">
                    ${editBtns}
                    <div class="section-progress-mini">
                        <div class="mini-bar"><div class="mini-fill" data-sfill="${s.id}"></div></div>
                        <span class="mini-text" data-stext="${s.id}">0%</span>
                    </div>
                </div>
            </div>
            ${desc}
            <div class="task-list" data-slist="${s.id}" ${s.collapsed ? 'style="display:none"' : ''}>
                ${tasksHtml}
                ${addBtns}
            </div>
        </div>`;
    }).join('');
}

function renderTask(t, sid) {
    const cls = [
        'task-item',
        t.done ? 'checked' : '',
        t.indent ? 'sub-task' : '',
        (t.type === 'mail' || t.isMail) ? 'is-mail' : ''
    ].filter(Boolean).join(' ');

    const check = `<div class="custom-check" onclick="toggleTask('${sid}','${t.id}')">
        <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>`;

    if (editMode) {
        const typeBadge = (t.type === 'mail' || t.isMail)
            ? '<span class="task-type-badge">📧 Mail</span>'
            : '';
        return `
        <div class="${cls}" data-sid="${sid}" data-tid="${t.id}" draggable="true">
            ${check}
            <div class="task-edit-fields">
                <input type="text" class="task-input" value="${esc(t.label)}"
                    onchange="updateTask('${sid}','${t.id}','label',this.value)"
                    onkeydown="if(event.key==='Enter'){this.blur()}">
                <input type="text" class="task-note-input" value="${esc(t.note || '')}"
                    placeholder="Note (optionnel)"
                    onchange="updateTask('${sid}','${t.id}','note',this.value)"
                    onkeydown="if(event.key==='Enter'){this.blur()}">
            </div>
            <div class="edit-actions">
                ${typeBadge}
                <button class="btn-icon" onclick="toggleIndent('${sid}','${t.id}')" title="Indenter / Désindenter">↔</button>
                <button class="btn-icon" onclick="deleteTask('${sid}','${t.id}')" title="Supprimer">🗑️</button>
            </div>
        </div>`;
    }

    return `
    <div class="${cls}" data-sid="${sid}" data-tid="${t.id}" draggable="true">
        ${check}
        <span class="task-label" onclick="toggleTask('${sid}','${t.id}')">
            ${esc(t.label)}${t.note ? `<span class="task-note">${esc(t.note)}</span>` : ''}
        </span>
    </div>`;
}

/* ═══════════════════════════════════════════════════════
   Progress
   ═══════════════════════════════════════════════════════ */
function updateProgress() {
    let total = 0, done = 0;
    state.sections.forEach(s => {
        let st = 0, sd = 0;
        s.tasks.forEach(t => { st++; total++; if (t.done) { sd++; done++; } });
        const sp = st ? Math.round((sd / st) * 100) : 0;
        const fill = document.querySelector(`[data-sfill="${s.id}"]`);
        const text = document.querySelector(`[data-stext="${s.id}"]`);
        if (fill) fill.style.width = sp + '%';
        if (text) text.textContent = sp + '%';
    });
    const pct = total ? Math.round((done / total) * 100) : 0;
    const gDone = document.getElementById('gDone');
    const gTotal = document.getElementById('gTotal');
    const gBar = document.getElementById('gBar');
    const gPercent = document.getElementById('gPercent');
    if (gDone) gDone.textContent = done;
    if (gTotal) gTotal.textContent = total;
    if (gBar) gBar.style.width = pct + '%';
    if (gPercent) gPercent.textContent = pct + ' %';
    if (pct === 100 && total > 0) launchConfetti();
}

/* ═══════════════════════════════════════════════════════
   Task Operations
   ═══════════════════════════════════════════════════════ */
function toggleTask(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t.done = !t.done;

    // For mail tasks, sync with sent status
    if (t.type === 'mail' || t.isMail) {
        if (t.done && !t.sentAt) {
            markMailTaskSent(sid, tid);
        } else if (!t.done && t.sentAt) {
            unmarkMailTaskSent(sid, tid);
        }
    }

    const el = document.querySelector(`[data-sid="${sid}"][data-tid="${tid}"]`);
    if (el) el.classList.toggle('checked', t.done);
    updateProgress();
    autoSave();
    if (currentTab === 'mail') renderMailTab();
}

function updateTask(sid, tid, field, value) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t[field] = value;
    autoSave();
}

function addTask(sid, type) {
    type = type || 'task';
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    s.tasks.push({
        id: uid(), label: '', note: '', done: false, indent: 0,
        type: type, isMail: type === 'mail',
        mailTo: '', mailFrom: '', mailSubject: '', mailBody: '',
        sentAt: null, respondedAt: null
    });
    render();
    autoSave();
    const inputs = document.querySelectorAll(`[data-sid="${sid}"] .task-input`);
    if (inputs.length) inputs[inputs.length - 1].focus();
}

function deleteTask(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    s.tasks = s.tasks.filter(t => t.id !== tid);
    render();
    autoSave();
}

function toggleIndent(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t.indent = t.indent ? 0 : 1;
    render();
    autoSave();
}

/* ═══════════════════════════════════════════════════════
   Drag & Drop
   ═══════════════════════════════════════════════════════ */
function setupDragDrop() {
    document.querySelectorAll('.task-item[draggable]').forEach(el => {
        el.addEventListener('dragstart', e => {
            dragData = { sid: el.dataset.sid, tid: el.dataset.tid };
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => {
            el.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
            dragData = null;
        });
    });

    document.querySelectorAll('.section').forEach(sec => {
        sec.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            sec.classList.add('drag-over');
        });
        sec.addEventListener('dragleave', e => {
            if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over');
        });
        sec.addEventListener('drop', e => {
            e.preventDefault();
            sec.classList.remove('drag-over');
            if (!dragData) return;
            const targetSid = sec.dataset.sid;
            if (dragData.sid === targetSid) return;
            const from = state.sections.find(s => s.id === dragData.sid);
            const to = state.sections.find(s => s.id === targetSid);
            if (!from || !to) return;
            const idx = from.tasks.findIndex(t => t.id === dragData.tid);
            if (idx === -1) return;
            const [task] = from.tasks.splice(idx, 1);
            to.tasks.push(task);
            render();
            autoSave();
            showToast('Tâche déplacée', 'success', 1500);
        });
    });
}

   ═══════════════════════════════════════════════════════ */
let mailRecipients = [];

function renderMailTags() {
    const container = document.getElementById('mailToTags');
    const input = document.getElementById('mailToInput');
    container.querySelectorAll('.email-tag').forEach(t => t.remove());
    mailRecipients.forEach((email, i) => {
        const tag = document.createElement('span');
        tag.className = 'email-tag';
        const c = contacts.find(c => c.email === email);
        tag.innerHTML = `${esc(c ? c.name : email)}<span class="tag-remove" onclick="removeRecipient(${i})">&times;</span>`;
        tag.title = email;
        container.insertBefore(tag, input);
    });
}

function addRecipient(email) {
    email = email.trim();
    if (!email || mailRecipients.includes(email)) return;
    mailRecipients.push(email);
    renderMailTags();
    const input = document.getElementById('mailToInput');
    input.value = '';
    document.getElementById('contactList').classList.remove('show');
}

function removeRecipient(index) {
    mailRecipients.splice(index, 1);
    renderMailTags();
}

function getMailToValue() {
    return mailRecipients.join(', ');
}

function onContactInput() {
    const input = document.getElementById('mailToInput');
    const list = document.getElementById('contactList');
    const val = input.value.toLowerCase().trim();
    if (!val || val.length < 1) { list.classList.remove('show'); return; }
    const matches = contacts.filter(c =>
        !mailRecipients.includes(c.email) &&
        (c.name.toLowerCase().includes(val) || c.email.toLowerCase().includes(val))
    ).slice(0, 10);
    if (!matches.length) { list.classList.remove('show'); return; }
    list.innerHTML = matches.map(c =>
        `<div class="autocomplete-item" onclick="selectContact('${esc(c.email)}')">
            <span class="ac-name">${esc(c.name)}</span>
            <span class="ac-email">${esc(c.email)}</span>
        </div>`
    ).join('');
    list.classList.add('show');
}

function selectContact(email) {
    addRecipient(email);
}

function onTagKeydown(e) {
    const input = document.getElementById('mailToInput');
    if ((e.key === 'Enter' || e.key === ',' || e.key === 'Tab') && input.value.trim()) {
        e.preventDefault();
        addRecipient(input.value.replace(/,/g, '').trim());
    }
    if (e.key === 'Backspace' && !input.value && mailRecipients.length) {
        removeRecipient(mailRecipients.length - 1);
    }
}

document.addEventListener('click', e => {

        const list = document.getElementById('contactList');

   ═══════════════════════════════════════════════════════ */
async function reformulateMail() {
    const body = document.getElementById('mailBody').value.trim();
    if (!body) { showToast('Écris un message d\'abord.', 'error'); return; }
    if (!state.settings.geminiKey) {
        showToast('Configure ta clé API Gemini dans ⚙️', 'error', 3000);
        openSettings();
        return;
    }
    showLoading('L\'IA reformule ton message…');
    try {
        const r = await fetch('/api/reformulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: state.settings.geminiKey, text: body })
        });
        const result = await r.json();
        if (result.error) {
            showToast('Erreur IA : ' + result.error, 'error', 5000);
        } else if (result.text) {
            document.getElementById('mailBody').value = result.text;
            showToast('Message reformulé !', 'success');
        }
    } catch (e) {
        showToast('Erreur : ' + e.message, 'error', 5000);
    } finally {
        hideLoading();
    }
}

/* ═══════════════════════════════════════════════════════
   Mail Tab — Helpers
   ═══════════════════════════════════════════════════════ */
function getAllMailTasks() {
    const mails = [];
    state.sections.forEach(s => {
        s.tasks.forEach(t => {
            if (t.type === 'mail' || t.isMail) {
                mails.push({ ...t, sectionId: s.id, sectionTitle: s.title, sectionEmoji: s.emoji });
            }
        });
    });
    return mails;
}

function getMailTaskStatus(t) {
    if (t.respondedAt) return 'responded';
    if (t.sentAt) {
        const hasActiveReminder = (state.reminders || []).some(r =>
            r.taskId === t.id && r.status === 'pending'
        );
        return hasActiveReminder ? 'waiting' : 'sent';
    }
    return 'pending';
}

function getMailStatusLabel(status) {
    switch(status) {
        case 'pending': return 'À envoyer';
        case 'sent': return 'Envoyé';
        case 'waiting': return 'En attente';
        case 'responded': return 'Répondu';
        default: return '';
    }
}

/* ═══════════════════════════════════════════════════════
   Mail Tab — Main Render
   ═══════════════════════════════════════════════════════ */
function renderMailTab() {
    renderTimeline();
    renderMailList();
    updateMailComposerState();
    updateMailBadge();
}

function renderMailList() {
    const container = document.getElementById('mail-pending-list');
    if (!container) return;
    const mails = getAllMailTasks();

    if (!mails.length) {
        container.innerHTML = `
            <h2>📬 Mails à traiter</h2>
            <div class="mail-pending-empty">
                Aucun mail à traiter. Crée un mail depuis l'onglet Todo<br>(mode édition → <strong>📧 + Mail</strong>).
            </div>`;
        return;
    }

    const pending = mails.filter(m => !m.sentAt && !m.respondedAt);
    const waiting = mails.filter(m => m.sentAt && !m.respondedAt);
    const responded = mails.filter(m => m.respondedAt);

    let html = '<h2>📬 Mails à traiter</h2>';
    if (pending.length) html += renderMailGroup('À envoyer', pending);
    if (waiting.length) html += renderMailGroup('En attente de réponse', waiting);
    if (responded.length) html += renderMailGroup('Terminés', responded);

    container.innerHTML = html;
}

function renderMailGroup(title, mails) {
    let html = `<div class="mail-group-label">${esc(title)}</div>`;
    html += mails.map(m => {
        const status = getMailTaskStatus(m);
        const statusLabel = getMailStatusLabel(status);
        const isSelected = selectedMailTask && selectedMailTask.tid === m.id;
        const cls = ['mail-item', isSelected ? 'selected' : '', m.sentAt ? 'is-sent' : ''].filter(Boolean).join(' ');
        const checkDone = m.sentAt ? 'done' : '';

        let actionsHtml = '';
        if (status === 'sent' || status === 'waiting') {
            actionsHtml += `<button onclick="event.stopPropagation();markResponseReceived('${m.sectionId}','${m.id}')" title="Réponse reçue">✅</button>`;
        }

        return `
        <div class="${cls}" onclick="selectMailForCompose('${m.sectionId}','${m.id}')">
            <div class="mail-item-check ${checkDone}" onclick="event.stopPropagation();toggleMailSentFromList('${m.sectionId}','${m.id}')">
                <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
            </div>
            <div class="mail-item-info">
                <div class="mail-item-label">${m.sectionEmoji} ${esc(m.label || 'Sans titre')}</div>
                <div class="mail-item-section">${esc(m.sectionTitle)}${m.mailTo ? ' → ' + esc(m.mailTo) : ''}</div>
            </div>
            <span class="mail-item-status ${status}">${statusLabel}</span>
            <div class="mail-item-actions">${actionsHtml}</div>
        </div>`;
    }).join('');
    return html;
}

/* ═══════════════════════════════════════════════════════
   Mail Tab — Composer Integration
   ═══════════════════════════════════════════════════════ */
function selectMailForCompose(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;

    selectedMailTask = { sid, tid };

    mailRecipients = t.mailTo ? t.mailTo.split(',').map(e => e.trim()).filter(Boolean) : [];
    renderMailTags();
    document.getElementById('mailSubject').value = t.mailSubject || t.label || '';
    document.getElementById('mailBody').value = t.mailBody || '';
    if (t.mailFrom) {
        const sel = document.getElementById('mailFrom');
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === t.mailFrom) { sel.selectedIndex = i; break; }
        }
    }

    updateMailComposerState();
    renderMailList();
    document.getElementById('mailComposer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function deselectMailTask() {
    selectedMailTask = null;
    mailRecipients = [];
    renderMailTags();
    document.getElementById('mailSubject').value = '';
    document.getElementById('mailBody').value = '';
    updateMailComposerState();
    renderMailList();
}

function updateMailComposerState() {

    if (selectedMailTask) {

        const t = s ? s.tasks.find(x => x.id === selectedMailTask.tid) : null;
        if (t) {
            composer.classList.add('has-selection');

            banner.innerHTML = `
                <div class="selected-task-banner">
                    <span>📧 <strong>${esc(t.label || 'Sans titre')}</strong></span>

                    <button class="deselect-btn" onclick="deselectMailTask()">✕</button>
                </div>`;

                if (!t.sentAt) {
                    sentActions.style.display = '';
                    sentActions.innerHTML = `<button class="btn-sent-confirm" onclick="markCurrentMailSent()">✅ Marquer comme envoyé</button>`;
                } else if (!t.respondedAt) {
                    sentActions.style.display = '';

    banner.innerHTML = '';
    if (sentActions) sentActions.style.display = 'none';

/* ═══════════════════════════════════════════════════════
   Mail Sent / Response Tracking
   ═══════════════════════════════════════════════════════ */
function markMailTaskSent(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t || t.sentAt) return;

    const now = Date.now();
    t.sentAt = now;
    t.done = true;

    state.mailEvents = state.mailEvents || [];
    state.mailEvents.push({
        id: uid(), taskId: tid, sectionId: sid,
        type: 'sent', date: now,
        label: t.mailSubject || t.label, to: t.mailTo
    });

    state.reminders = state.reminders || [];
    state.reminders.push({
        id: uid(), taskId: tid, sectionId: sid,
        label: t.mailSubject || t.label,
        mailTo: t.mailTo || '', mailSubject: t.mailSubject || t.label,
        mailBody: t.mailBody || '', mailFrom: t.mailFrom || '',
        createdAt: now,
        remindAt: now + 3 * 24 * 60 * 60 * 1000,
        cycle: 1, status: 'pending'
    });
}

function unmarkMailTaskSent(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;
    t.sentAt = null;
    t.respondedAt = null;
    state.mailEvents = (state.mailEvents || []).filter(e => e.taskId !== tid);
    state.reminders = (state.reminders || []).filter(r => r.taskId !== tid || r.status === 'sent');
}

function markResponseReceived(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;

    const now = Date.now();
    t.respondedAt = now;

    state.mailEvents = state.mailEvents || [];
    state.mailEvents.push({
        id: uid(), taskId: tid, sectionId: sid,
        type: 'response', date: now, label: t.mailSubject || t.label
    });

    (state.reminders || []).forEach(r => {
        if (r.taskId === tid && r.status === 'pending') r.status = 'responded';
    });

    autoSave();
    if (currentTab === 'mail') renderMailTab();
    showToast('Réponse reçue ! Rappels annulés.', 'success');
}

function toggleMailSentFromList(sid, tid) {
    const s = state.sections.find(x => x.id === sid);
    if (!s) return;
    const t = s.tasks.find(x => x.id === tid);
    if (!t) return;

    if (!t.sentAt) {
        if (!t.mailSubject && !t.label) {
            selectMailForCompose(sid, tid);
            showToast('Remplis d\'abord les détails du mail.', 'error');
            return;
        }
        markMailTaskSent(sid, tid);
        showToast('Mail marqué comme envoyé !', 'success');
    } else {
        unmarkMailTaskSent(sid, tid);
        t.done = false;
        showToast('Envoi annulé.', 'success');
    }

    autoSave();
    render();
    renderMailTab();
}

/* ═══════════════════════════════════════════════════════
   Timeline
   ═══════════════════════════════════════════════════════ */
function renderTimeline() {
    const container = document.getElementById('timeline-container');
    if (!container) return;

    const now = new Date();
    const year = timelineMonth.getFullYear();
    const month = timelineMonth.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const monthName = timelineMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

    const events = getTimelineEvents(year, month);

    let html = `
        <div class="timeline-header">
            <h2>📅 ${esc(monthName.charAt(0).toUpperCase() + monthName.slice(1))}</h2>
            <div class="timeline-nav">
                <button onclick="navigateTimeline(-1)">◀</button>
                <button onclick="navigateTimeline(0)">Aujourd'hui</button>
                <button onclick="navigateTimeline(1)">▶</button>
            </div>
        </div>
        <div class="timeline-scroll">
            <div class="timeline-track">
                <div class="timeline-line"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = (d === now.getDate() && month === now.getMonth() && year === now.getFullYear());
        const dayEvents = events.filter(e => e.dateStr === dateStr);
        const dayName = date.toLocaleDateString('fr-FR', { weekday: 'short' }).slice(0, 2);

        const colClass = isToday ? 'timeline-day timeline-today-col' : 'timeline-day';
        html += `<div class="${colClass}" data-date="${dateStr}">`;
        html += `<div class="timeline-day-label">${dayName}<br>${d}</div>`;

        if (dayEvents.length > 0) {
            const order = { 'reminder-due': 0, 'sent': 1, 'reminder-sent': 2, 'reminder-pending': 3, 'response': 4 };
            const sorted = [...dayEvents].sort((a, b) => (order[a.dotClass] || 5) - (order[b.dotClass] || 5));
            const primary = sorted[0];
            html += `<div class="timeline-dot ${primary.dotClass}"
                onclick="showTimelinePopover(event, '${dateStr}')"
                title="${esc(primary.tooltip)}"></div>`;
            html += `<div class="timeline-event-label">${dayEvents.length > 1 ? dayEvents.length + ' évén.' : esc(primary.shortLabel)}</div>`;
        } else if (isToday) {
            html += `<div class="timeline-dot today-marker"></div>`;
            html += `<div class="timeline-event-label">Auj.</div>`;
        } else {
            html += `<div class="timeline-dot empty"></div>`;
        }

        html += '</div>';
    }

    html += `</div></div>`;
    container.innerHTML = html;

    if (month === now.getMonth() && year === now.getFullYear()) {
        const todayCol = container.querySelector('.timeline-today-col');
        if (todayCol) {
            const scroll = container.querySelector('.timeline-scroll');
            scroll.scrollLeft = todayCol.offsetLeft - scroll.clientWidth / 2;
        }
    }
}

function getTimelineEvents(year, month) {
    const events = [];
    const now = Date.now();
    const monthStart = new Date(year, month, 1).getTime();
    const monthEnd = new Date(year, month + 1, 0, 23, 59, 59).getTime();

    (state.mailEvents || []).forEach(e => {
        if (e.date >= monthStart && e.date <= monthEnd) {
            const d = new Date(e.date);
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            let dotClass, tooltip, shortLabel;
            switch (e.type) {
                case 'sent':
                    dotClass = 'sent'; tooltip = `Envoyé : ${e.label}`; shortLabel = e.label || 'Mail'; break;
                case 'reminder_sent':
                    dotClass = 'reminder-sent'; tooltip = `Relance #${e.cycle || '?'} : ${e.label}`; shortLabel = `Relance #${e.cycle || '?'}`; break;
                case 'response':
                    dotClass = 'response'; tooltip = `Réponse : ${e.label}`; shortLabel = 'Réponse'; break;
                default: return;
            }
            events.push({ ...e, dateStr, dotClass, tooltip, shortLabel });
        }
    });

    (state.reminders || []).forEach(r => {
        if (r.status === 'dismissed' || r.status === 'responded' || r.status === 'sent') return;
        if (r.remindAt >= monthStart && r.remindAt <= monthEnd) {
            const d = new Date(r.remindAt);
            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const isDue = r.remindAt <= now;
            const dotClass = isDue ? 'reminder-due' : 'reminder-pending';
            const tooltip = isDue ? `⚠ Rappel dû : ${r.label}` : `Rappel prévu : ${r.label}`;
            const shortLabel = isDue ? '⚠ Rappel' : `J+${r.cycle * 3}`;
            events.push({ ...r, dateStr, dotClass, tooltip, shortLabel, isReminder: true, reminderId: r.id });
        }
    });

    return events;
}

function navigateTimeline(direction) {
    if (direction === 0) {
        timelineMonth = new Date();
    } else {
        timelineMonth = new Date(timelineMonth.getFullYear(), timelineMonth.getMonth() + direction, 1);
    }
    renderTimeline();
}

function showTimelinePopover(evt, dateStr) {
    document.querySelectorAll('.timeline-popover').forEach(p => p.remove());

    const year = timelineMonth.getFullYear();
    const month = timelineMonth.getMonth();
    const dayEvents = getTimelineEvents(year, month).filter(e => e.dateStr === dateStr);
    if (!dayEvents.length) return;

    const dot = evt.target;
    const popover = document.createElement('div');
    popover.className = 'timeline-popover show';

    let html = '';
    dayEvents.forEach(e => {
        html += `<div style="margin-bottom:0.5rem;">`;
        html += `<div class="timeline-popover-title">${esc(e.tooltip)}</div>`;
        html += `<div class="timeline-popover-actions">`;

        if (e.isReminder && e.dotClass === 'reminder-due') {
            html += `<button onclick="handleDueReminder('${e.reminderId}')">🤖 Générer relance IA</button>`;
            html += `<button onclick="markReminderResponseReceived('${e.reminderId}')">✅ Réponse reçue</button>`;
            html += `<button onclick="editReminderDate('${e.reminderId}')">📅 Modifier la date</button>`;
            html += `<button class="danger" onclick="dismissReminderFromTimeline('${e.reminderId}')">🗑 Supprimer</button>`;
        } else if (e.isReminder && e.dotClass === 'reminder-pending') {
            html += `<button onclick="handleDueReminder('${e.reminderId}')">🤖 Traiter maintenant</button>`;
            html += `<button onclick="markReminderResponseReceived('${e.reminderId}')">✅ Réponse reçue</button>`;
            html += `<button onclick="editReminderDate('${e.reminderId}')">📅 Modifier la date</button>`;
            html += `<button class="danger" onclick="dismissReminderFromTimeline('${e.reminderId}')">🗑 Supprimer</button>`;
        } else if (e.type === 'sent' || e.type === 'reminder_sent') {
            html += `<button onclick="selectMailForCompose('${e.sectionId}','${e.taskId}')">📧 Voir le mail</button>`;
        }

        html += `</div></div>`;
    });

    popover.innerHTML = html;
    dot.parentElement.style.position = 'relative';
    dot.parentElement.appendChild(popover);

    setTimeout(() => {
        const close = (ev) => {
            if (!popover.contains(ev.target) && ev.target !== dot) {
                popover.remove();
                document.removeEventListener('click', close);
            }
        };
        document.addEventListener('click', close);
    }, 10);
}

async function handleDueReminder(rid) {
    const r = (state.reminders || []).find(x => x.id === rid);
    if (!r) return;

    document.querySelectorAll('.timeline-popover').forEach(p => p.remove());

    if (!state.settings.geminiKey) {
        showToast('Configure ta clé API Gemini dans ⚙️', 'error', 3000);
        openSettings();
        return;
    }

    showLoading('L\'IA génère une relance…');
    try {
        const res = await fetch('/api/generate-reminder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: state.settings.geminiKey,
                to: r.mailTo,
                subject: r.mailSubject || r.label,
                body: r.mailBody || r.label,
                cycle: r.cycle
            })
        });
        const result = await res.json();
        if (result.ok && result.reminder) {
            currentReminder = { rid, ...result.reminder, to: r.mailTo, from: r.mailFrom };
            document.getElementById('reminderTo').value = r.mailTo || '';
            document.getElementById('reminderSubject').value = result.reminder.subject || '';
            document.getElementById('reminderBody').value = result.reminder.body || '';
            document.getElementById('reminderModal').classList.add('show');
            showToast('Relance générée !', 'success');
        } else {
            showToast('Erreur IA : ' + (result.error || 'Échec'), 'error', 5000);
        }
    } catch (e) {
        showToast('Erreur : ' + e.message, 'error', 5000);
    } finally {
        hideLoading();
    }
}

/* ═══════════════════════════════════════════════════════
   Confetti
   ═══════════════════════════════════════════════════════ */
function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = [];
    const colors = ['#6c8aff','#34d399','#f59e0b','#a78bfa','#f472b6','#fff'];
    for (let i = 0; i < 150; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            tilt: Math.random() * 10 - 5,
            speed: Math.random() * 3 + 2,
            opacity: 1,
        });
    }
    let frame = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
            if (p.opacity <= 0) return;
            alive = true;
            p.y += p.speed;
            p.tilt += 0.05;
            p.opacity -= 0.005;
            ctx.globalAlpha = Math.max(0, p.opacity);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(p.x + Math.sin(p.tilt) * 15, p.y, p.r, p.r * 0.6, p.tilt, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        if (alive && frame < 300) { frame++; requestAnimationFrame(draw); }
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    draw();
}

    document.getElementById('btn-maximize').addEventListener('click', () => api.maximize());
    document.getElementById('btn-close').addEventListener('click', () => api.close());
})();

/* ═══════════════════════════════════════════════════════
   Custom Context Menu (right-click)
   ═══════════════════════════════════════════════════════ */
document.addEventListener('contextmenu', (e) => {
    const api = window.electronAPI;
    if (!api) return; // browser fallback = default context menu
    e.preventDefault();

    const taskItem = e.target.closest('.task-item');
    const params = {
        hasSelection: !!window.getSelection().toString(),
        isEditable: e.target.matches('input, textarea, [contenteditable]'),
        isTask: !!taskItem,
        taskId: taskItem ? taskItem.dataset.tid : null,
        sectionId: taskItem ? taskItem.dataset.sid : null,
        isTaskDone: taskItem ? taskItem.classList.contains('checked') : false,
    };

    api.showContextMenu(params);
});

// Listen for context menu actions from main process
if (window.electronAPI) {
    window.electronAPI.onContextMenuAction('context-menu:toggle-task', (tid, sid) => {
        if (typeof toggleTask === 'function') toggleTask(sid, tid);
    });
    window.electronAPI.onContextMenuAction('context-menu:delete-task', (tid, sid) => {
        if (typeof deleteTask === 'function') deleteTask(sid, tid);
    });
}

/* ═══════════════════════════════════════════════════════
   Keyboard Shortcuts
   ═══════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
    // Ctrl+E — toggle edit mode
    if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
        e.preventDefault();
        toggleEdit();
    }
    // Ctrl+1 — switch to Todo tab
    if ((e.ctrlKey || e.metaKey) && e.key === '1') {
        e.preventDefault();
        switchTab('todo');
    }
    // Ctrl+2 — switch to Mail tab
    if ((e.ctrlKey || e.metaKey) && e.key === '2') {
        e.preventDefault();
        switchTab('mail');
    }
    // Ctrl+N — new section (when in edit mode)
    if ((e.ctrlKey || e.metaKey) && e.key === 'n' && editMode) {
        e.preventDefault();
        openSectionModal();
    }
    // Escape — close modals
    if (e.key === 'Escape') {
        closeSectionModal();
        closeSettings();
        if (typeof closeReminderModal === 'function') closeReminderModal();
    }
});
</script>
